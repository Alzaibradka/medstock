/* =====================================================================
   8. INVENTORY MODULE
   Modes : inventory-check, expiry-purge
   Etat persiste en localStorage (session courante, max 12h)
   ===================================================================== */
(function() {
  'use strict';

  var LS_KEY  = 'stock_inventory_session';
  var MAX_AGE = 12 * 3600 * 1000;

  var _mode     = null;
  var _basket   = [];
  var _sectorId = null;

  /* Persister / restaurer */
  function _save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ _ts: Date.now(), mode: _mode, basket: _basket, sectorId: _sectorId })); } catch(e) {}
  }
  function _load() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return false;
      var s = JSON.parse(raw);
      if (!s || (Date.now() - s._ts) > MAX_AGE) { localStorage.removeItem(LS_KEY); return false; }
      _mode = s.mode; _basket = s.basket || []; _sectorId = s.sectorId || null;
      return true;
    } catch(e) { return false; }
  }
  function _clear() {
    _mode = null; _basket = []; _sectorId = null;
    try { localStorage.removeItem(LS_KEY); } catch(e) {}
  }

  /* Importer un JSON tagge et basculer en mode */
  function importInventoryFile() {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.style.cssText = 'position:fixed;top:-9999px';
    document.body.appendChild(inp);
    inp.addEventListener('change', function() {
      var file = inp.files && inp.files[0];
      document.body.removeChild(inp);
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          var type = data._type;
          if (type !== 'inventory-check' && type !== 'expiry-purge') {
            showToast('Fichier non reconnu : attendu inventory-check ou expiry-purge', 'danger');
            return;
          }
          _startMode(type, data);
        } catch(err) { showToast('Fichier invalide', 'danger'); }
      };
      reader.readAsText(file);
      inp.value = '';
    });
    inp.click();
  }

  function _startMode(type, data) {
    _mode     = type;
    _sectorId = data._sectorId || 'global';
    _basket   = (data.stock || []).map(function(e) {
      var prod = (data.products || []).find(function(p) { return p.id === e.productId; });
      return {
        productId: e.productId,
        gtin:      prod ? (prod.gtin || null) : null,
        name:      prod ? prod.name : '(inconnu)',
        unit:      prod ? (prod.unit || 'u') : 'u',
        lot:       e.lot    || '',
        expiry:    e.expiry || '',
        qty:       e.qty    || 0,
        _entryId:  e.id
      };
    }).filter(function(b) { return b.qty > 0; });
    _save();
    renderInventoryView();
    showToast(type === 'expiry-purge' ? 'Mode purge perimes actif' : 'Mode inventaire actif', 'ok');
  }

  /* Rendu vue inventaire */
  function renderInventoryView() {
    var content   = document.getElementById('sector-content');
    var actionBar = document.getElementById('sector-action-bar');
    if (!content) return;

    if (actionBar) {
      actionBar.innerHTML =
        '<button class="btn btn-primary" id="btn-inv-scan" style="flex:2">Scanner</button>'
        + '<button class="btn btn-ghost"   id="btn-inv-resume" style="flex:1">Reprendre</button>'
        + '<button class="btn btn-warning" id="btn-inv-finish" style="flex:1">Terminer</button>';
      actionBar.style.display = 'flex';
    }

    var remaining = _basket.filter(function(b) { return b.qty > 0; });
    var excess    = _basket.filter(function(b) { return b.qty < 0; });

    var html = '<div class="module-content">';
    var sectorName = (_sectorId && _sectorId !== 'global')
      ? (storeGetSectorById(_sectorId) || {name: 'Inconnu'}).name : 'Global';
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap">';
    html += '<span style="font-size:12px;font-weight:600">'
      + (_mode === 'expiry-purge' ? 'Purge perimes' : 'Verification inventaire')
      + ' — ' + escH(sectorName) + '</span>';
    html += '<span style="font-size:11px;color:var(--text2)">' + remaining.length + ' ref. restantes</span>';
    html += '</div>';

    if (_basket.length === 0) {
      html += '<div class="empty-state">'
        + '<div class="empty-state-icon">OK</div>'
        + '<div class="empty-state-title">Inventaire conforme</div>'
        + '<div class="empty-state-sub">Tous les articles ont ete verifies.</div>'
        + '</div>';
    } else {
      if (remaining.length > 0) {
        html += '<div class="section-title" style="color:var(--danger)">A scanner (' + remaining.length + ')</div>';
        remaining.forEach(function(b) { html += _row(b, 'danger'); });
      }
      if (excess.length > 0) {
        html += '<div class="section-title" style="color:var(--warn)">Excedents (' + excess.length + ')</div>';
        excess.forEach(function(b) { html += _row(b, 'warn'); });
      }
    }
    html += '</div>';

    var fresh = content.cloneNode(false);
    fresh.innerHTML = html;
    content.parentNode.replaceChild(fresh, content);

    var btnScan = document.getElementById('btn-inv-scan');
    if (btnScan) btnScan.addEventListener('click', function() { startScan('add', null, null, true); });
    var btnResume = document.getElementById('btn-inv-resume');
    if (btnResume) btnResume.addEventListener('click', function() { startScan('add', null, null, true); });
    var btnFinish = document.getElementById('btn-inv-finish');
    if (btnFinish) btnFinish.addEventListener('click', _finish);
  }

  function _row(b, status) {
    var color = status === 'danger' ? 'var(--danger)' : 'var(--warn)';
    var qty   = Math.abs(b.qty);
    var sign  = b.qty > 0 ? '-' : '+';
    var html  = '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:12px;font-weight:600">' + escH(b.name) + '</div>';
    html += '<div style="font-size:10px;color:var(--text3)">';
    if (b.lot)    html += 'Lot ' + escH(b.lot);
    if (b.expiry) html += (b.lot ? ' — ' : '') + 'Exp. ' + escH(displayDate(b.expiry));
    html += '</div></div>';
    html += '<span style="font-size:14px;font-weight:700;color:' + color + '">'
      + sign + qty + ' ' + escH(b.unit) + '</span>';
    html += '</div>';
    return html;
  }

  /* Scan recu en mode inventaire */
  function handleInventoryScan(product, gs1, qty) {
    var gtin = product ? product.gtin : (gs1 ? gs1.gtin : null);
    var lot  = gs1 ? (gs1.lot || '') : '';
    var idx  = -1;

    /* Chercher par GTIN + lot exact */
    _basket.forEach(function(b, i) {
      if (idx !== -1) return;
      if (gtin && b.gtin === gtin && b.lot === lot) idx = i;
    });
    /* Fallback GTIN seul */
    if (idx === -1 && gtin) {
      _basket.forEach(function(b, i) {
        if (idx !== -1) return;
        if (b.gtin === gtin && !b.lot) idx = i;
      });
    }

    if (idx !== -1) {
      _basket[idx].qty -= qty;
      if (_basket[idx].qty === 0) _basket.splice(idx, 1);
    } else {
      /* Excedent : produit non attendu */
      _basket.push({
        productId: product ? product.id : null,
        gtin:      gtin,
        name:      product ? product.name : (gtin || 'Inconnu'),
        unit:      product ? (product.unit || 'u') : 'u',
        lot:       lot,
        expiry:    gs1 ? (gs1.expiry || '') : '',
        qty:       -qty
      });
    }
    _save();
    renderInventoryView();
  }

  /* Popup quantite simplifie en mode inventaire */
  function _invQtyModal(product, gs1) {
    var unit = product ? (product.unit || 'u') : 'u';
    var bodyHtml =
      '<div style="text-align:center;margin-bottom:12px">'
      + '<div style="font-size:14px;font-weight:600">' + escH(product ? product.name : '?') + '</div>'
      + '<div style="font-size:11px;color:var(--text2)">'
      + (gs1 && gs1.lot    ? 'Lot ' + escH(gs1.lot)                   : '')
      + (gs1 && gs1.lot && gs1.expiry ? ' — ' : '')
      + (gs1 && gs1.expiry ? 'Exp. ' + escH(displayDate(gs1.expiry))  : '')
      + '</div></div>'
      + '<div class="form-group" style="max-width:140px;margin:0 auto">'
      + '<label style="text-align:center">Quantite (' + escH(unit) + ')</label>'
      + '<input type="number" id="inv-qty-input" inputmode="numeric" value="1" min="1"'
      + ' style="text-align:center;font-size:22px;font-weight:700">'
      + '</div>';
    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-inv-qty">Annuler</button>'
      + '<button class="btn btn-primary"   id="btn-inv-qty-ok">Valider</button>';
    var modal = createModal('modal-inv-qty', 'Scanner', bodyHtml, footerHtml, 'sm');
    if (!modal) return;
    setTimeout(function() { var i = document.getElementById('inv-qty-input'); if (i) { i.focus(); i.select(); } }, 60);
    modal.addEventListener('click', function(e) {
      if (e.target.id !== 'btn-inv-qty-ok') return;
      var inp = document.getElementById('inv-qty-input');
      var qty = inp ? Math.max(1, parseInt(inp.value, 10) || 1) : 1;
      closeModal('modal-inv-qty');
      handleInventoryScan(product, gs1, qty);
      /* Relance auto en mode inventaire */
      setTimeout(_triggerNativeCapture, 200);
    });
  }

  /* Patcher openQtyModal pour intercepter en mode inventaire */
  function _patchOpenQtyModal() {
    var _orig = window.openQtyModal;
    window.openQtyModal = function(product, gs1) {
      if (_mode) { _invQtyModal(product, gs1); }
      else { _orig(product, gs1); }
    };
  }

  /* Terminer l'inventaire */
  function _finish() {
    if (!confirm('Terminer et appliquer les ecarts au stock ?')) return;
    var sectorId = _sectorId || getCurrentSectorId();
    var corrections = 0;

    _basket.forEach(function(b) {
      if (b.qty === 0) return;
      var isDeficit = b.qty > 0;
      var absQty    = Math.abs(b.qty);
      corrections++;

      if (isDeficit) {
        storeAddMovement({ type:'out', subtype:'correction',
          sectorId: sectorId, targetSectorId: null,
          productId: b.productId, lot: b.lot, expiry: b.expiry,
          qty: absQty, note: 'Correction inventaire' });
        storeGetStockBySector(sectorId).filter(function(e) {
          return e.productId === b.productId && e.lot === b.lot;
        }).forEach(function(e) {
          var newQty = Math.max(0, e.qty - absQty);
          if (newQty === 0) { e._deletedAt = Date.now(); }
          else { e.qty = newQty; e._updatedAt = Date.now(); }
          storeUpsertStockEntry(e);
        });
      } else {
        storeAddMovement({ type:'in', subtype:'correction',
          sectorId: sectorId, targetSectorId: null,
          productId: b.productId, lot: b.lot, expiry: b.expiry,
          qty: absQty, note: 'Correction inventaire' });
        var existing = storeGetStockBySector(sectorId).find(function(e) {
          return e.productId === b.productId && e.lot === b.lot;
        });
        if (existing) {
          existing.qty += absQty; existing._updatedAt = Date.now();
          storeUpsertStockEntry(existing);
        } else {
          storeUpsertStockEntry({ id: genId(), sectorId: sectorId,
            productId: b.productId, lot: b.lot, expiry: b.expiry,
            qty: absQty, location: '', _updatedAt: Date.now(), _deletedAt: null });
        }
      }
    });

    fsScheduleSave();
    _clear();
    renderSectorContent();
    showToast(corrections > 0 ? corrections + ' correction(s) appliquee(s)' : 'Inventaire conforme, aucun ecart', 'ok');
  }

  /* Reprendre session existante */
  function resumeIfSession() {
    if (_load() && _mode) {
      showToast('Session ' + (_mode === 'expiry-purge' ? 'purge' : 'inventaire') + ' reprise', 'ok');
      renderInventoryView();
    }
  }

  /* Barre d'action selon mode */
  function renderModeBar() {
    var actionBar = document.getElementById('sector-action-bar');
    if (!actionBar) return;

    /* Mode inventaire/purge en cours : déléguer à renderInventoryView */
    if (_mode) { renderInventoryView(); return; }

    var deployMode = window.deployGetMode ? window.deployGetMode() : null;

    if (deployMode === 'satellite') {
      /* Mode satellite : boutons dédiés inventaire / purge / commande */
      actionBar.innerHTML =
        '<button class="btn btn-primary"   id="btn-sat-inventory" style="flex:1;font-size:11px">Inventaire</button>'
        + '<button class="btn btn-warning" id="btn-sat-purge"     style="flex:1;font-size:11px">Purge</button>'
        + '<button class="btn btn-success" id="btn-sat-commande"  style="flex:1;font-size:11px">Commande</button>';
      actionBar.style.display = 'flex';

      var btnInv = document.getElementById('btn-sat-inventory');
      var btnPur = document.getElementById('btn-sat-purge');
      var btnCmd = document.getElementById('btn-sat-commande');

      /* Inventaire/Purge : importer un JSON tagué depuis le maître */
      if (btnInv) btnInv.addEventListener('click', function() {
        if (window.importInventoryFile) window.importInventoryFile();
      });
      if (btnPur) btnPur.addEventListener('click', function() {
        if (window.importInventoryFile) window.importInventoryFile();
      });
      /* Commande : mode ADD avec relance auto */
      if (btnCmd) btnCmd.addEventListener('click', function() {
        startScan('add', null, null, true);
      });
    } else {
      /* Mode normal (master / standalone) */
      actionBar.innerHTML =
        '<button class="btn btn-success" id="btn-action-add">+ Ajouter</button>'
        + '<button class="btn btn-warning" id="btn-action-transfer">Transferer</button>'
        + '<button class="btn btn-danger"  id="btn-action-out">Sortir</button>';
      var btnAdd = document.getElementById('btn-action-add');
      var btnTr  = document.getElementById('btn-action-transfer');
      var btnOut = document.getElementById('btn-action-out');
      if (btnAdd) btnAdd.addEventListener('click', function() { openActionModal('add'); });
      if (btnTr)  btnTr.addEventListener('click',  function() {
        var sid = getCurrentSectorId();
        var others = storeGetSectors().filter(function(s) { return s.id !== sid && s.id !== 'global'; });
        if (others.length === 0) { showToast('Aucun autre secteur', 'warn'); return; }
        openActionModal('transfer');
      });
      if (btnOut) btnOut.addEventListener('click', function() { openActionModal('out'); });
    }
  }

  window.importInventoryFile      = importInventoryFile;
  window.renderModeBar            = renderModeBar;
  window.resumeInventorySession   = resumeIfSession;
  window._patchOpenQtyModal       = _patchOpenQtyModal;

}());



/* =====================================================================
   9. DEPLOY MODULE
   Gestion du mode de deploiement : master / standalone / satellite
   - Modale de choix au premier lancement
   - Tag _deployMode sur les exports full
   - Verrou satellite : refuse les JSON sans tag reconnu
   - Option changement dans les reglages
   ===================================================================== */
(function() {
  'use strict';

  var MODES = {
    master:     { label: 'PC Maitre',        icon: 'PC',  desc: 'Douchette + base complete. Reference de toutes les donnees.' },
    standalone: { label: 'Mobile autonome',  icon: 'MOB', desc: 'Scan camera + synchronisation JSON manuelle.' },
    satellite:  { label: 'Satellite',        icon: 'SAT', desc: 'Mouvements terrain uniquement. Synchronise vers le maitre.' }
  };

  /* Lire / ecrire le mode */
  var LS_DEPLOY_KEY = 'stock_deploy_mode';
  function getMode() {
    /* localStorage d'abord (disponible avant chargement du fichier) */
    var ls = localStorage.getItem(LS_DEPLOY_KEY);
    if (ls) return ls;
    return storeGetSetting('deployMode') || null;
  }
  function setMode(mode) {
    localStorage.setItem(LS_DEPLOY_KEY, mode);
    storeSetSetting('deployMode', mode);
    fsScheduleSave();
  }

  /* ── Modale de choix du mode ── */
  function openDeployModal(onClose) {
    var current = getMode();
    var bodyHtml = '<div style="display:flex;flex-direction:column;gap:10px;padding:4px 0">';
    Object.keys(MODES).forEach(function(key) {
      var m = MODES[key];
      var active = current === key;
      bodyHtml +=
        '<button class="btn ' + (active ? 'btn-primary' : 'btn-secondary') + ' btn-block deploy-mode-btn"'
        + ' data-mode="' + key + '" style="text-align:left;padding:14px 16px">'
        + '<div style="font-size:13px;font-weight:700">' + escH(m.icon) + '  ' + escH(m.label) + (active ? '  (actuel)' : '') + '</div>'
        + '<div style="font-size:11px;opacity:.75;margin-top:3px">' + escH(m.desc) + '</div>'
        + '</button>';
    });
    bodyHtml += '</div>';

    var footerHtml = '<button class="btn btn-ghost" data-close-modal="modal-deploy">Annuler</button>';
    var modal = createModal('modal-deploy', 'Mode de deploiement', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    modal.addEventListener('click', function(e) {
      var btn = e.target.closest('.deploy-mode-btn');
      if (!btn) return;
      var mode = btn.dataset.mode;
      setMode(mode);
      closeModal('modal-deploy');
      applyDeployMode(mode);
      showToast('Mode : ' + MODES[mode].label, 'ok');
      if (onClose) onClose(mode);
    });
  }

  /* ── Appliquer le mode : ajuster l'UI ── */
  function applyDeployMode(mode) {
    /* Satellite : remplacer la barre d'action par les boutons de mode */
    if (window.renderModeBar) window.renderModeBar();
    /* Afficher/masquer elements specifiques au mode */
    var masterOnly = document.querySelectorAll('[data-master-only]');
    var satOnly    = document.querySelectorAll('[data-satellite-only]');
    masterOnly.forEach(function(el) { el.style.display = mode === 'master' ? '' : 'none'; });
    satOnly.forEach(function(el)    { el.style.display = mode === 'satellite' ? '' : 'none'; });
  }

  /* ── Modale d'initialisation (premier lancement) ── */
  function promptDeployIfNeeded(callback) {
    if (getMode()) { if (callback) callback(); return; }

    /* Premier lancement : forcer le choix avant tout */
    var modal = document.getElementById('fs-startup-modal');
    if (modal) modal.classList.remove('open');

    var bodyHtml =
      '<div style="font-size:12px;color:var(--text2);margin-bottom:16px;text-align:center">'
      + 'Comment allez-vous utiliser STOCK ?<br>'
      + 'Ce choix peut etre modifie dans les reglages.'
      + '</div>'
      + '<div style="display:flex;flex-direction:column;gap:10px">';
    Object.keys(MODES).forEach(function(key) {
      var m = MODES[key];
      bodyHtml +=
        '<button class="btn btn-secondary btn-block deploy-init-btn"'
        + ' data-mode="' + key + '" style="text-align:left;padding:14px 16px">'
        + '<div style="font-size:13px;font-weight:700">' + escH(m.icon) + '  ' + escH(m.label) + '</div>'
        + '<div style="font-size:11px;opacity:.75;margin-top:3px">' + escH(m.desc) + '</div>'
        + '</button>';
    });
    bodyHtml += '</div>';

    var deployModal = createModal('modal-deploy-init', 'Bienvenue sur STOCK', bodyHtml, '', 'sm');
    if (!deployModal) { if (callback) callback(); return; }

    /* Empecher la fermeture par clic exterieur */
    deployModal.addEventListener('click', function(e) {
      var btn = e.target.closest('.deploy-init-btn');
      if (!btn) return;
      var mode = btn.dataset.mode;
      setMode(mode);
      closeModal('modal-deploy-init');
      applyDeployMode(mode);
      showToast('Mode configure : ' + MODES[mode].label, 'ok');
      if (callback) callback();
    });
  }

  /* ── Verrou satellite : valider un JSON avant chargement ──
     Retourne true si le fichier est acceptable dans le mode courant */
  function validateImport(data) {
    var mode = getMode();
    if (mode !== 'satellite') return true; /* Maitre/autonome : tout accepte */

    var type = data._type || null;
    /* Satellite accepte : inventory-check, expiry-purge, stock-library, movements-sync */
    /* Satellite accepte aussi les JSON full tagges _deployMode */
    var allowed = ['inventory-check', 'expiry-purge', 'stock-library', 'movements-sync'];
    if (type && allowed.indexOf(type) !== -1) return true;
    if (!type && data._deployMode) return true; /* JSON full avec tag */
    if (!type && !data._deployMode) {
      showToast('Satellite : fichier non reconnu. Importez un JSON tagge.', 'danger');
      return false;
    }
    return true;
  }

  /* ── Injecter _deployMode dans un payload d'export full ── */
  function tagExportPayload(payload) {
    var mode = getMode();
    if (mode) payload._deployMode = mode;
    return payload;
  }

  /* ── Afficher le mode dans les reglages ── */
  function renderDeploySection() {
    var mode = getMode();
    var m    = mode ? MODES[mode] : null;
    var html = '<div class="section-title">Mode de deploiement</div>';
    html += '<div class="settings-card">';
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">';
    html += '<div style="font-size:28px">' + (m ? escH(m.icon) : '?') + '</div>';
    html += '<div>';
    html += '<div style="font-size:13px;font-weight:600">' + (m ? escH(m.label) : 'Non configure') + '</div>';
    html += '<div style="font-size:11px;color:var(--text2)">' + (m ? escH(m.desc) : '') + '</div>';
    html += '</div></div>';
    html += '<button class="btn btn-secondary btn-block" id="btn-change-deploy-mode">Changer de mode</button>';
    html += '</div>';
    return html;
  }

  /* ── Expose ── */
  window.deployGetMode          = getMode;
  window.deploySetMode          = setMode;
  window.openDeployModal        = openDeployModal;
  window.promptDeployIfNeeded   = promptDeployIfNeeded;
  window.deployValidateImport   = validateImport;
  window.deployTagPayload       = tagExportPayload;
  window.deployRenderSection    = renderDeploySection;
  window.applyDeployMode        = applyDeployMode;

}());





/* =====================================================================
   11. MERGE MODULE
   Synchronisation satellite → maître via échange de fichiers JSON.

   Flux :
     Satellite : export movements-sync → JSON tagué avec tous les mouvements < 7j
     Maître    : import movements-sync → déduplication par ID → application
                 chronologique → recalcul stock → purge mouvements > 7j

   Pas de flag synced — la déduplication se fait uniquement par mouvement.id
   (UUID unique généré à la création).
   ===================================================================== */
(function() {
  'use strict';

  var CUTOFF_7D = 7 * 86400 * 1000;

  /* ── Export mouvements (satellite → maître) ── */
  function exportMovements() {
    var mode = window.deployGetMode ? window.deployGetMode() : null;
    if (mode === 'master') {
      showToast('Export mouvements non disponible en mode maître', 'warn');
      return;
    }

    var cutoff = Date.now() - CUTOFF_7D;
    var movements = storeGetMovements().filter(function(m) {
      return m.date && m.date > cutoff;
    });

    if (movements.length === 0) {
      showToast('Aucun mouvement récent à exporter', 'warn');
      return;
    }

    /* Inclure les produits référencés pour que le maître puisse les identifier */
    var productIds = {};
    movements.forEach(function(m) { if (m.productId) productIds[m.productId] = true; });
    var products = storeGetProducts().filter(function(p) { return productIds[p.id]; });

    var payload = {
      _type:        'movements-sync',
      _version:     SCHEMA_VERSION,
      _exportedAt:  Date.now(),
      _deployMode:  mode || 'satellite',
      _sectorIds:   _extractSectorIds(movements),
      movements:    movements,
      products:     products   /* fiches produits pour enrichir le catalogue maître */
    };

    var fname = 'movements_sync_' + fmtTs() + '.json';
    var blob  = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var url   = URL.createObjectURL(blob);
    var a     = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
    showToast('Export : ' + movements.length + ' mouvement(s) — ' + fname);
  }

  function _extractSectorIds(movements) {
    var ids = {};
    movements.forEach(function(m) {
      if (m.sectorId)       ids[m.sectorId] = true;
      if (m.targetSectorId) ids[m.targetSectorId] = true;
    });
    return Object.keys(ids);
  }

  /* ── Import et merge sur le maître ── */
  function importMovements() {
    var mode = window.deployGetMode ? window.deployGetMode() : null;
    if (mode !== 'master') {
      showToast('Import mouvements disponible uniquement en mode maître', 'warn');
      return;
    }

    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.style.cssText = 'position:fixed;top:-9999px';
    document.body.appendChild(inp);
    inp.addEventListener('change', function() {
      var file = inp.files && inp.files[0];
      document.body.removeChild(inp);
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          if (data._type !== 'movements-sync') {
            showToast('Fichier non reconnu — attendu : movements-sync', 'danger');
            return;
          }
          if (window.checkImportVersion && !window.checkImportVersion(data)) return;
          _applyMerge(data);
        } catch(err) { showToast('Fichier invalide', 'danger'); }
      };
      reader.readAsText(file);
      inp.value = '';
    });
    inp.click();
  }

  function _applyMerge(data) {
    var incoming   = data.movements || [];
    var inProducts = data.products  || [];

    if (incoming.length === 0) {
      showToast('Aucun mouvement dans le fichier', 'warn');
      return;
    }

    /* 1. Enrichir le catalogue produits local avec les nouvelles fiches */
    var prodAdded = 0;
    inProducts.forEach(function(p) {
      if (!p.id && !p.gtin) return;
      var existing = p.gtin ? storeGetProductByGtin(p.gtin) : storeGetProductById(p.id);
      if (!existing) {
        if (!p.id) p.id = genId();
        if (p.pkgQty      === undefined) p.pkgQty      = 0;
        if (p.alertQtyMin     === undefined) p.alertQtyMin     = 0;
      if (p.alertQtyOptimal === undefined) p.alertQtyOptimal = 0;
        storeUpsertProduct(p);
        prodAdded++;
      } else if ((p._updatedAt || 0) > (existing._updatedAt || 0)) {
        Object.assign(existing, p);
        storeUpsertProduct(existing);
      }
    });

    /* 2. Récupérer les IDs des mouvements déjà connus (7 derniers jours) */
    var knownIds = {};
    storeGetMovements().forEach(function(m) { knownIds[m.id] = true; });

    /* 3. Filtrer les nouveaux mouvements (déduplication par ID) */
    var cutoff  = Date.now() - CUTOFF_7D;
    var newMovs = incoming.filter(function(m) {
      return m.id && !knownIds[m.id] && m.date && m.date > cutoff;
    });

    if (newMovs.length === 0) {
      showToast('Aucun nouveau mouvement (déjà synchronisés ou trop anciens)', 'ok');
      return;
    }

    /* 4. Trier par ordre chronologique */
    newMovs.sort(function(a, b) { return (a.date || 0) - (b.date || 0); });

    /* 5. Appliquer chaque mouvement sur le stock */
    var applied = 0; var errors = 0;
    newMovs.forEach(function(m) {
      try {
        _applyMovementToStock(m);
        /* Ajouter au journal local */
        _state_push_movement(m);
        applied++;
      } catch(err) {
        console.warn('[MergeModule] mouvement ignoré', m.id, err);
        errors++;
      }
    });

    fsScheduleSave();
    renderSectorContent();

    var msg = applied + ' mouvement(s) appliqué(s)';
    if (prodAdded > 0) msg += ', ' + prodAdded + ' produit(s) ajouté(s)';
    if (errors > 0)    msg += ', ' + errors + ' erreur(s)';
    showToast(msg, errors > 0 ? 'warn' : 'ok');
  }

  /* Appliquer un mouvement importé sur le stock local */
  function _applyMovementToStock(m) {
    var type    = m.type;
    var qty     = m.qty || 0;
    if (qty <= 0) return;

    if (type === 'in') {
      /* Entrée : trouver ou créer l'entrée de stock */
      var entries = storeGetStockBySector(m.sectorId).filter(function(e) {
        return e.productId === m.productId && e.lot === (m.lot || '') && !e._deletedAt;
      });
      if (entries.length > 0) {
        entries[0].qty += qty;
        entries[0]._updatedAt = m.date || Date.now();
        storeUpsertStockEntry(entries[0]);
      } else {
        storeUpsertStockEntry({
          id:         genId(),
          sectorId:   m.sectorId,
          productId:  m.productId,
          lot:        m.lot    || '',
          expiry:     m.expiry || '',
          qty:        qty,
          location:   '',
          _updatedAt: m.date || Date.now(),
          _deletedAt: null
        });
      }
    } else if (type === 'out') {
      /* Sortie : déduire du stock (FEFO si lot non précisé) */
      var outEntries = storeGetStockBySector(m.sectorId).filter(function(e) {
        return e.productId === m.productId && !e._deletedAt &&
               (!m.lot || e.lot === m.lot);
      });
      /* Trier FEFO */
      outEntries.sort(function(a, b) {
        if (!a.expiry && !b.expiry) return 0;
        if (!a.expiry) return 1;
        if (!b.expiry) return -1;
        return a.expiry < b.expiry ? -1 : 1;
      });
      var remaining = qty;
      outEntries.forEach(function(e) {
        if (remaining <= 0) return;
        var deduct = Math.min(e.qty, remaining);
        e.qty -= deduct;
        remaining -= deduct;
        if (e.qty <= 0) { e._deletedAt = m.date || Date.now(); }
        else { e._updatedAt = m.date || Date.now(); }
        storeUpsertStockEntry(e);
      });
    } else if (type === 'transfer') {
      /* Transfert : sortie du secteur source + entrée dans le secteur destination */
      _applyMovementToStock(Object.assign({}, m, { type: 'out' }));
      if (m.targetSectorId) {
        _applyMovementToStock(Object.assign({}, m, { type: 'in', sectorId: m.targetSectorId }));
      }
    }
  }

  /* Pousser un mouvement dans _state sans passer par addMovement (qui regénère l'ID) */
  function _state_push_movement(m) {
    var raw = storeGetRaw();
    raw.movements.push(m);
    raw._updatedAt = Date.now();
  }

  /* ── Purge mouvements > 7j (appelée avant sauvegarde) ── */
  function pruneMovements() {
    var cutoff = Date.now() - CUTOFF_7D;
    var raw    = storeGetRaw();
    var before = raw.movements.length;
    raw.movements = raw.movements.filter(function(m) {
      return m.date && m.date > cutoff;
    });
    var pruned = before - raw.movements.length;
    if (pruned > 0) window.dbg('MergeModule : ' + pruned + ' mouvements purgés', 'info');
  }

  window.mergeExportMovements = exportMovements;
  window.mergeImportMovements = importMovements;
  window.mergePruneMovements  = pruneMovements;

}());


/* =====================================================================
   7. APP INIT
   Point d'entrée unique. Lie les événements globaux et démarre.
   ===================================================================== */
(function() {
  'use strict';

  /* ── Rendu global de l'app (appelé après chargement du fichier) ── */

  /* Met à jour le header avec le nom et logo de l'application */
  function _updateHeaderBrand() {
    var settings = storeGetSettings();
    var nameEl   = document.getElementById('header-appname');
    var logoEl   = document.getElementById('header-logo');
    if (nameEl) nameEl.textContent = settings.unitName || 'STOCK';
    if (logoEl) {
      if (settings.appLogo) {
        logoEl.src = settings.appLogo;
        logoEl.style.display = '';
      } else {
        logoEl.style.display = 'none';
      }
    }
  }
  window._updateHeaderBrand = _updateHeaderBrand;

  function renderApp() {
    window.dbg('renderApp()', 'ok');
    renderSectorNav();
    renderSectorContent();
    /* Mettre à jour le nom de l'unité dans le header si défini */
    var settings = storeGetSettings();
    if (settings.unitName) {
      document.title = 'STOCK — ' + settings.unitName;
    }
  }

  /* ── Liaison des événements globaux ── */
  function bindGlobalEvents() {
    /* Bouton réglages */
    var btnSettings = document.getElementById('btn-settings');
    if (btnSettings) {
      btnSettings.addEventListener('click', function() {
        openSettingsModal();
      });
    }

    /* Bouton debug */

    /* Bouton rapports -> ReportModule */
    var btnExtract = document.getElementById('btn-extract');
    if (btnExtract) {
      btnExtract.addEventListener('click', function() {
        switchView('report');
        if (window.renderReport) window.renderReport();
      });
    }

    /* Bouton open fichier dans statusbar */
    var btnFsOpen = document.getElementById('btn-fs-open');
    if (btnFsOpen) {
      btnFsOpen.addEventListener('click', function() {
        if ('showOpenFilePicker' in window) {
          fsChooseFile();
        } else {
          fsImportJSON();
        }
      });
    }

    /* Actions secteur — entièrement gérées par renderModeBar() */
    if (window.renderModeBar) window.renderModeBar();

    /* Import fichier fallback */
    var fileInput = document.getElementById('file-input-main');
    if (fileInput) {
      fileInput.addEventListener('change', fsOnImportFile);
    }
  }

  /* ── Initialisation ── */
  function init() {
    window.dbg('init() démarré', 'ok');
    if (window._patchOpenQtyModal) window._patchOpenQtyModal();
    bindGlobalEvents();
    if (window.promptDeployIfNeeded) {
      window.promptDeployIfNeeded(function() { fsInit(); });
    } else {
      fsInit();
    }
  }

  /* _postRenderInit : appelé après chaque renderApp() principal */
  function _postRenderInit() {
    if (window.applyDeployMode) window.applyDeployMode(window.deployGetMode ? window.deployGetMode() : null);
    if (window.resumeInventorySession) window.resumeInventorySession();
    window.dbg('_postRenderInit OK', 'ok');
  }
  window._postRenderInit = _postRenderInit;

  /* Expose renderApp pour FSModule */
  window.renderApp = renderApp;

  /* Démarrage au chargement du DOM */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

}());

/* =====================================================================
   8. PWA — Service Worker + Manifest dynamique
   Injecte le manifest et enregistre le SW pour le mode offline/installable.
   ===================================================================== */
(function() {
  'use strict';

  /* ── Icône SVG générée inline (512x512) ── */
  var ICON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
    + '<rect width="512" height="512" rx="96" fill="#0d0d0d"/>'
    + '<rect x="80" y="120" width="160" height="20" rx="6" fill="#4f7cff"/>'
    + '<rect x="80" y="160" width="240" height="20" rx="6" fill="#3ecf8e"/>'
    + '<rect x="80" y="200" width="200" height="20" rx="6" fill="#4f7cff"/>'
    + '<rect x="80" y="260" width="160" height="20" rx="6" fill="#3ecf8e"/>'
    + '<rect x="80" y="300" width="240" height="20" rx="6" fill="#4f7cff"/>'
    + '<rect x="80" y="340" width="180" height="20" rx="6" fill="#3ecf8e"/>'
    + '<text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="56" font-weight="700" fill="#ffffff">STOCK</text>'
    + '</svg>';

  var ICON_URL = 'data:image/svg+xml,' + encodeURIComponent(ICON_SVG);

  /* ── Manifest embarqué ── */
  var manifest = {
    name:             'STOCK — Gestion de stock',
    short_name:       'STOCK',
    description:      'Gestion de stock médicaments et dispositifs médicaux',
    start_url:        './',
    display:          'standalone',
    background_color: '#0d0d0d',
    theme_color:      '#0d0d0d',
    orientation:      'portrait-primary',
    icons: [
      { src: ICON_URL, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: ICON_URL, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };

  function injectManifest() {
    /* blob: URI — fonctionne sur localhost et HTTP Server Android */
    var blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    var url  = URL.createObjectURL(blob);
    var link = document.getElementById('pwa-manifest');
    if (link) link.href = url;
    var icon = document.getElementById('pwa-icon');
    if (icon) icon.href = ICON_URL;
  }

  /* SW chargé depuis ./sw.js (fichier séparé) */

  function registerSW() {
    if (!('serviceWorker' in navigator)) {
      window.dbg('Service Worker non supporté', 'warn');
      return;
    }
    try {
      /* sw.js séparé — version injectée dans l'URL pour forcer le rechargement */
      var swUrl = './sw.js?v=' + SCHEMA_VERSION;
      navigator.serviceWorker.register(swUrl, { scope: './' })
        .then(function(reg) {
          window.dbg('SW enregistré — scope: ' + reg.scope, 'ok');
          /* Détecter une mise à jour en attente */
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                _showUpdateBanner();
              }
            });
          });
        })
        .catch(function(e) {
          window.dbg('SW échec: ' + e.message, 'warn');
        });
      /* Écouter le message SW_UPDATED (nouvelle version activée) */
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_UPDATED') {
          _showUpdateBanner();
        }
      });
    } catch(e) {
      window.dbg('SW init erreur: ' + e.message, 'warn');
    }
  }

  /* ── Bannière "Ajouter à l'écran d'accueil" ── */
  var _deferredPrompt = null;

  /* Bannière mise à jour disponible */
  function _showUpdateBanner() {
    if (document.getElementById('pwa-update-banner')) return;
    var banner = document.createElement('div');
    banner.id = 'pwa-update-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;'
      + 'background:var(--accent);color:#fff;padding:10px 14px;'
      + 'display:flex;align-items:center;gap:10px;font-size:12px;';
    banner.innerHTML =
      '<span style="flex:1">&#x1F504; Nouvelle version disponible</span>'
      + '<button id="btn-sw-update" style="background:#fff;color:var(--accent);border:none;'
      + 'border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">Mettre \u00e0 jour</button>'
      + '<button id="btn-sw-dismiss" style="background:transparent;border:none;color:#fff;'
      + 'cursor:pointer;font-size:16px;padding:0 4px">\u2715</button>';
    document.body.appendChild(banner);
    document.getElementById('btn-sw-update').addEventListener('click', function() {
      /* Forcer rechargement pour activer la nouvelle version */
      window.location.reload();
    });
    document.getElementById('btn-sw-dismiss').addEventListener('click', function() {
      banner.remove();
    });
  }

  function initInstallPrompt() {
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredPrompt = e;
      _showInstallBanner();
    });
    window.addEventListener('appinstalled', function() {
      _hideInstallBanner();
      window.dbg('PWA installée', 'ok');
    });
  }

  function _showInstallBanner() {
    var existing = document.getElementById('pwa-install-banner');
    if (existing) return;
    var banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = 'position:fixed;bottom:70px;left:12px;right:12px;z-index:9997;'
      + 'background:var(--surface2);border:1px solid var(--accent);border-radius:12px;'
      + 'padding:12px 14px;display:flex;align-items:center;gap:10px;'
      + 'box-shadow:0 4px 20px rgba(0,0,0,.5)';
    banner.innerHTML = '<span style="font-size:22px">📲</span>'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:12px;font-weight:600">Installer STOCK</div>'
      + '<div style="font-size:10px;color:var(--text2)">Ajouter à l\'écran d\'accueil pour un accès rapide</div>'
      + '</div>'
      + '<button id="btn-pwa-install" class="btn btn-primary btn-sm">Installer</button>'
      + '<button id="btn-pwa-dismiss" class="btn btn-ghost btn-sm">✕</button>';
    document.body.appendChild(banner);

    document.getElementById('btn-pwa-install').addEventListener('click', function() {
      if (_deferredPrompt) {
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(function(r) {
          window.dbg('Install prompt: ' + r.outcome, 'info');
          _deferredPrompt = null;
          _hideInstallBanner();
        });
      }
    });
    document.getElementById('btn-pwa-dismiss').addEventListener('click', _hideInstallBanner);
  }

  function _hideInstallBanner() {
    var b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
  }

  /* ── Init ── */
  function initPWA() {
    injectManifest();
    registerSW();
    initInstallPrompt();
    window.dbg('PWA initialisé', 'ok');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPWA);
  } else {
    initPWA();
  }

}());
</script>
