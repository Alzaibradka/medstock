      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  /* ── Expose ── */
  window.fsInit         = fsInit;
  window.fsScheduleSave = fsScheduleSave;
  window.fsChooseFile   = fsChooseFile;
  window.fsCreateNewFile = fsCreateNewFile;
  window.fsResumeHandle = fsResumeHandle;
  window.fsStartupDegraded = fsStartupDegraded;
  window.fsClearHandle  = fsClearHandle;

  /* ── Import librairie produits (library.json) ── */
  function importLibrary() {
    var inp = document.createElement('input');
    inp.type   = 'file';
    inp.accept = '.json,application/json';
    inp.style.cssText = 'position:fixed;top:-9999px';
    document.body.appendChild(inp);
    inp.addEventListener('change', function() {
      var file = inp.files && inp.files[0];
      if (!file) { document.body.removeChild(inp); return; }
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          if (data._type !== 'stock-library') {
            showToast('Fichier non reconnu — attendu : stock-library', 'danger');
            return;
          }
          var products = data.products || [];
          var added = 0; var updated = 0;
          products.forEach(function(p) {
            if (!p.gtin && !p.name) return;
            var existing = p.gtin ? storeGetProductByGtin(p.gtin) : null;
            if (!existing && p.name) {
              existing = storeGetProducts().find(function(x) {
                return x.name && x.name.toLowerCase() === (p.name || '').toLowerCase();
              }) || null;
            }
            if (existing) {
              if ((p._updatedAt || 0) > (existing._updatedAt || 0)) {
                Object.assign(existing, p);
                storeUpsertProduct(existing);
                updated++;
              }
            } else {
              if (!p.id) p.id = genId();
              if (p.pkgQty      === undefined) p.pkgQty      = 0;
              if (p.alertQtyMin     === undefined) p.alertQtyMin     = 0;
      if (p.alertQtyOptimal === undefined) p.alertQtyOptimal = 0;
              storeUpsertProduct(p);
              added++;
            }
          });
          fsScheduleSave();
          showToast('Librairie : ' + added + ' ajout(s), ' + updated + ' mise(s) a jour', 'ok');
          document.body.removeChild(inp);
        } catch(err) {
          showToast('Fichier librairie invalide', 'danger');
          document.body.removeChild(inp);
        }
      };
      reader.readAsText(file);
      inp.value = '';
    });
    inp.click();
  }


  /* ── Contrôle de version à l'import ──
     Compare data._version avec SCHEMA_VERSION local.
     Retourne true si l'import peut continuer, false si bloqué.
     Types full et movements-sync sont contrôlés.
     Types library, inventory-check, expiry-purge sont libres (format stable). */
  function checkImportVersion(data) {
    var exempt = ['stock-library', 'inventory-check', 'expiry-purge'];
    var type   = data._type || null;
    if (type && exempt.indexOf(type) !== -1) return true;

    var dataVer  = data._version || null;
    if (!dataVer) return true; /* ancien fichier sans version : laisser passer, migrateData gère */

    var local    = SCHEMA_VERSION;
    var dParts   = dataVer.split('.').map(Number);
    var lParts   = local.split('.').map(Number);

    /* Comparer majeur.mineur (on ignore le patch pour la compatibilité) */
    var dMaj = dParts[0] || 0; var dMin = dParts[1] || 0;
    var lMaj = lParts[0] || 0; var lMin = lParts[1] || 0;

    if (dMaj > lMaj || (dMaj === lMaj && dMin > lMin)) {
      /* Fichier plus récent que l'app — bloquer */
      if (!confirm(
        'Version incompatible\n\n'
        + 'Ce fichier est en version ' + dataVer + '.\n'
        + 'Cette application est en version ' + local + '.\n\n'
        + 'Mettez à jour l\'application avant d\'importer ce fichier.\n\n'
        + 'Forcer l\'import quand même ? (non recommandé)'
      )) return false;
      showToast('Import forcé — risque d\'incompatibilité', 'warn');
      return true;
    }

    if (dMaj < lMaj || (dMaj === lMaj && dMin < lMin)) {
      /* Fichier plus ancien — avertir et proposer migration */
      var ok = confirm(
        'Fichier ancien\n\n'
        + 'Ce fichier est en version ' + dataVer + '.\n'
        + 'Cette application est en version ' + local + '.\n\n'
        + 'La migration sera appliquée automatiquement.\n'
        + 'L\'autre appareil doit être mis à jour avant le prochain échange.\n\n'
        + 'Continuer ?'
      );
      if (!ok) return false;
      showToast('Migration v' + dataVer + ' \u2192 v' + local + ' appliquée', 'ok');
      return true;
    }

    return true; /* versions identiques */
  }

  window.checkImportVersion = checkImportVersion;

  window.fsExportJSON   = fsExportJSON;
  window.importLibrary  = importLibrary;
  window.fsImportJSON   = fsImportJSON;
  window.fsOnImportFile = fsOnImportFile;
  window.fsSetHandle    = function(h) { _fsHandle = h; };
  window.fsGetHandle    = function()  { return _fsHandle; };

}());


/* =====================================================================
   4. UI UTILS (partagé entre modules)
   Fonctions DOM communes : toast, modales.
   ===================================================================== */
(function() {
  'use strict';

  /* ── Toast ── */
  function showToast(msg, type, duration) {
    var t = document.getElementById('app-toast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'visible' + (type ? ' toast-' + type : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.className = ''; }, duration || 2800);
  }

  /* ── Ouvrir/fermer une modale générique ── */
  function openModal(id) {
    var el = document.getElementById(id);
    if (el) el.classList.add('open');
  }

  function closeModal(id) {
    var el = document.getElementById(id);
    if (el) el.classList.remove('open');
  }

  /* ── Créer une modale dynamique dans #modal-container ── */
  function createModal(id, title, bodyHtml, footerHtml, size) {
    var container = document.getElementById('modal-container');
    if (!container) return;
    /* Supprimer une modale existante avec le même id */
    var existing = document.getElementById(id);
    if (existing) existing.remove();

    var sizeClass = 'modal-' + (size || 'md');
    var el = document.createElement('div');
    el.className = 'modal-overlay';
    el.id = id;
    el.innerHTML =
      '<div class="modal ' + escH(sizeClass) + '">'
      + '<div class="modal-header">'
      + '  <div class="modal-title">' + title + '</div>'
      + '  <button class="modal-close" data-close-modal="' + escH(id) + '">&#215;</button>'
      + '</div>'
      + '<div class="modal-body">' + bodyHtml + '</div>'
      + (footerHtml ? '<div class="modal-footer">' + footerHtml + '</div>' : '')
      + '</div>';
    container.appendChild(el);

    /* Délégation : fermeture par overlay ou bouton close */
    el.addEventListener('click', function(e) {
      if (e.target === el) closeModal(id);
      var btn = e.target.closest('[data-close-modal]');
      if (btn) closeModal(btn.dataset.closeModal);
    });

    openModal(id);
    return el;
  }

  /* ── Navigation modules ── */
  function switchView(name) {
    window.dbg('switchView(' + name + ')', 'info');
    document.querySelectorAll('.module-container').forEach(function(el) {
      el.classList.remove('active');
    });
    var target = document.getElementById('mod-' + name);
    if (target) target.classList.add('active');
  }

  /* ── Expose ── */
  window.showToast   = showToast;
  window.openModal   = openModal;
  window.closeModal  = closeModal;
  window.createModal = createModal;
  window.switchView  = switchView;

}());


/* =====================================================================
   5. SECTOR MODULE
   Navigation par secteur, rendu de la barre d'onglets,
   affichage placeholder secteur.
   ===================================================================== */
(function() {
  'use strict';

  var _currentSectorId = 'global';

  /* ── Rendu barre de navigation ── */
  function renderSectorNav() {
    window.dbg('renderSectorNav() — secteurs=' + storeGetSectors().length, 'info');
    var bar = document.getElementById('sector-nav-bar');
    if (!bar) return;
    var sectors = storeGetSectors();
    var html = '';

    sectors.forEach(function(s) {
      var isActive = s.id === _currentSectorId;
      var alertCount = countAlertsInSector(s.id);
      var badgeHtml = alertCount > 0
        ? '<span class="sector-tab-badge">' + alertCount + '</span>'
        : '';
      var modeIcon = s.id === 'global' ? '' :
        (s.mode === 'box' ? '<span style="font-size:10px;opacity:.7;margin-right:3px">📦</span>'
                         : '<span style="font-size:10px;opacity:.7;margin-right:3px">💊</span>');
      html += '<button class="sector-tab' + (isActive ? ' active' : '') + '"'
        + ' data-sector-id="' + escH(s.id) + '">'
        + modeIcon + escH(s.name) + badgeHtml
        + '</button>';
    });

    /* Bouton + pour aller dans les réglages créer un secteur */
    html += '<button class="sector-tab sector-tab-add" id="btn-add-sector-tab" title="Gérer les secteurs">＋</button>';

    /* Cloner pour supprimer les anciens listeners avant rebind */
    var freshBar = bar.cloneNode(false);
    freshBar.innerHTML = html;
    bar.parentNode.replaceChild(freshBar, bar);

    freshBar.addEventListener('click', function(e) {
      var tab = e.target.closest('[data-sector-id]');
      if (tab) {
        selectSector(tab.dataset.sectorId);
        return;
      }
      if (e.target.closest('#btn-add-sector-tab')) {
        openSettingsModal('sectors');
      }
    });
  }

  /* ── Sélection d'un secteur ── */
  function selectSector(sectorId) {
    _searchQuery = ''; /* Reset recherche au changement de secteur */
    window.dbg('selectSector(' + sectorId + ')', 'info');
    _currentSectorId = sectorId;
    switchView('sector');
    renderSectorNav();
    renderSectorContent();
  }

  function getCurrentSectorId() { return _currentSectorId; }

  /* ── Mise à jour du nom dans le header ── */
  function updateHeaderSectorName() {
    var el = document.getElementById('header-sector-name');
    if (!el) return;
    var sector = storeGetSectorById(_currentSectorId);
    el.textContent = sector ? sector.name : '';
  }

  /* Compte alertes dans un secteur (périmés + stock bas) */
  function countAlertsInSector(sectorId) {
    var stock     = storeGetStockBySector(sectorId);
    var settings  = storeGetSettings();
    var groups    = groupStockByProduct(stock);
    var count     = 0;
    groups.forEach(function(g) {
      var hasExpiry = g.entries.some(function(e) {
        return expiryStatus(e.expiry) !== 'ok';
      });
      var min   = g.product ? (g.product.alertQtyMin || 0) : 0;
      var isLow = min > 0 && g.totalQty <= min;
      if (hasExpiry || isLow) count++;
    });
    return count;
  }

  /* ── Rendu du contenu secteur ── */
  function renderSectorContent() {
    window.dbg('renderSectorContent() — sectorId=' + _currentSectorId, 'info');
    var oldContent = document.getElementById('sector-content');
    var actionBar  = document.getElementById('sector-action-bar');
    if (!oldContent) return;

    var sector = storeGetSectorById(_currentSectorId);
    if (!sector) {
      oldContent.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div>'
        + '<div class="empty-state-title">Secteur introuvable</div></div>';
      return;
    }

    var isGlobal = _currentSectorId === 'global';

    /* Barre d'actions : cachée pour Global */
    if (actionBar) {
      actionBar.style.display = isGlobal ? 'none' : 'flex';
    }

    /* Créer un container frais pour éviter l'accumulation de listeners */
    var content = oldContent.cloneNode(false);
    content.id = 'sector-content';
    oldContent.parentNode.replaceChild(content, oldContent);

    /* Listener de délégation unique pour tout le contenu secteur */
    content.addEventListener('click', function(e) {
      /* Vue Global : naviguer vers un secteur */
      var sectorLink = e.target.closest('[data-sector-link]');
      if (sectorLink) { selectSector(sectorLink.dataset.sectorLink); return; }
      /* Vue Global : aller aux réglages */
      if (e.target.closest('[data-go-settings]')) {
        openSettingsModal(); return;
      }
      /* Vue Stock : toggle détail lots */
      var lotsToggle = e.target.closest('[data-toggle-lots]');
      if (lotsToggle) { toggleLotDetail(lotsToggle.dataset.toggleLots, content); return; }
      /* Toggle armoire */
      var locToggle = e.target.closest('[data-toggle-loc]');
      if (locToggle) {
        var locContent = content.querySelector('#' + locToggle.dataset.toggleLoc);
        if (locContent) {
          var collapsed = locContent.classList.toggle('collapsed');
          locToggle.classList.toggle('collapsed', collapsed);
        }
        return;
      }
      /* Toggle étagère */
      var subToggle = e.target.closest('[data-toggle-sub]');
      if (subToggle && !e.target.closest('[data-drag-entry]')) {
        var subContent = content.querySelector('#' + subToggle.dataset.toggleSub);
        if (subContent) {
          var subCollapsed = subContent.classList.toggle('collapsed');
          subToggle.classList.toggle('collapsed', subCollapsed);
        }
        return;
      }
      /* Vue Stock : éditer alertQtyMin du produit */
      var editAlert = e.target.closest('[data-edit-product-alert]');
      if (editAlert) { openProductAlertModal(editAlert.dataset.editProductAlert); return; }
      /* Réassigner emplacement d'une entrée de stock */
      var splitBtn = e.target.closest('[data-split-entry]');
      if (splitBtn) { openSplitModal(splitBtn.dataset.splitEntry, sector.id); return; }
      /* Effacer recherche */
      if (e.target.id === 'btn-search-clear') {
        _searchQuery = '';
        renderSectorContent();
        return;
      }
      var moveBtn = e.target.closest('[data-move-entry]');
      if (moveBtn) {
        /* Ouvrir popup déplacement — l'utilisateur choisit l'emplacement cible */
        openMoveFromButton(moveBtn.dataset.moveEntry, sector.id);
        return;
      }
    });

    /* Vérifier et afficher alertes périmés à l'ouverture */
    checkAndShowExpiredAlert(sector);

    if (isGlobal) {
      renderGlobalView(content);
    } else {
      renderStockView(content, sector);
      if (window._initDragDrop) window._initDragDrop(content, sector);
    }
  }

  /* Vue Global : consolidation tous secteurs */
  function renderGlobalView(container) {
    var sectors   = storeGetSectors().filter(function(s) { return s.id !== 'global'; });
    var settings  = storeGetSettings();

    if (sectors.length === 0) {
      container.innerHTML = '<div class="module-content"><div class="empty-state">'
        + '<div class="empty-state-icon">&#x1F3E5;</div>'
        + '<div class="empty-state-title">Aucun secteur configuré</div>'
        + '<div class="empty-state-sub">Créez vos secteurs dans les réglages.</div>'
        + '<button class="btn btn-primary" style="margin-top:12px" data-go-settings="1">Réglages</button>'
        + '</div></div>';
      return;
    }

    var sectorData = sectors.map(function(sector) {
      var stock  = storeGetStockBySector(sector.id);
      var groups = groupStockByProduct(stock, sector);
      var expired = 0, expiringSoon = 0, lowStock = 0;
      groups.forEach(function(g) {
        var w = 'ok';
        g.entries.forEach(function(e) {
          var s = expiryStatus(e.expiry);
          if (s === 'danger') w = 'danger';
          else if (s === 'warn' && w !== 'danger') w = 'warn';
        });
        if (w === 'danger') expired++;
        else if (w === 'warn') expiringSoon++;
        var min = g.product ? (g.product.alertQtyMin || 0) : 0;
        if (min > 0 && g.totalQty <= min) lowStock++;
      });
      return {
        sector:      sector,
        groups:      groups,
        totalUnits:  (function() {
          var pkgQ = 0;
          var grps = groupStockByProduct(stock, sector);
          return grps.reduce(function(s, g) { return s + (g.totalUnitsReal || g.totalQty); }, 0);
        })(),
        expired:     expired,
        expiringSoon: expiringSoon,
        lowStock:    lowStock,
        hasAlert:    expired > 0 || expiringSoon > 0 || lowStock > 0
      };
    });

    sectorData.sort(function(a, b) {
      if (a.hasAlert && !b.hasAlert) return -1;
      if (!a.hasAlert && b.hasAlert) return 1;
      return a.sector.name.localeCompare(b.sector.name);
    });

    var totExp = sectorData.reduce(function(s, d) { return s + d.expired; }, 0);
    var totLow = sectorData.reduce(function(s, d) { return s + d.lowStock; }, 0);
    var html   = '<div class="module-content">';

    if (totExp > 0 || totLow > 0) {
      html += '<div class="settings-card cell-danger" style="margin-bottom:10px">';
      html += '<div style="font-size:11px;font-weight:600;margin-bottom:4px">Alertes globales</div>';
      html += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
      if (totExp > 0) html += '<span class="badge badge-danger">' + totExp + ' lot' + (totExp > 1 ? 's' : '') + ' perime' + (totExp > 1 ? 's' : '') + '</span>';
      if (totLow > 0) html += '<span class="badge badge-warn">' + totLow + ' stock bas</span>';
      html += '</div></div>';
    }

    html += '<div class="section-title">Secteurs</div>';
    sectorData.forEach(function(d) {
      var sc = d.expired > 0 ? 'cell-danger' : (d.expiringSoon > 0 || d.lowStock > 0) ? 'cell-warn' : '';
      html += '<div class="settings-card ' + sc + '" style="cursor:pointer;margin-bottom:6px" data-sector-link="' + escH(d.sector.id) + '">';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:13px;font-weight:600">' + escH(d.sector.name) + '</div>';
      html += '<div style="font-size:10px;color:var(--text2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">';
      html += '<span>' + d.groups.length + ' ref. &mdash; ' + d.totalUnits + ' unite' + (d.totalUnits > 1 ? 's' : '') + '</span>';
      if (d.expired > 0)      html += '<span class="badge badge-danger">' + d.expired + ' perime' + (d.expired > 1 ? 's' : '') + '</span>';
      if (d.expiringSoon > 0) html += '<span class="badge badge-warn">' + d.expiringSoon + ' bientot</span>';
      if (d.lowStock > 0)     html += '<span class="badge badge-warn">' + d.lowStock + ' stock bas</span>';
      html += '</div></div>';
      html += '<span style="font-size:18px;color:var(--text3)">&#x203a;</span>';
      html += '</div></div>';
    });

    html += '</div>';
    container.innerHTML = html;
  }

  /* Compte les produits distincts dans une liste de stock */
  function countDistinctProducts(stockList) {
    var ids = {};
    stockList.forEach(function(s) { ids[s.productId] = true; });
    return Object.keys(ids).length;
  }

  /* Vue secteur : liste stock */
  var _searchQuery = ''; /* filtre recherche produit actif */

  function renderStockView(container, sector) {
    var stock     = storeGetStockBySector(sector.id);
    var settings  = storeGetSettings();

    if (stock.length === 0) {
      container.innerHTML = '<div class="module-content"><div class="empty-state">'
        + '<div class="empty-state-icon">&#x1F4E6;</div>'
        + '<div class="empty-state-title">Stock vide</div>'
        + '<div class="empty-state-sub">Scannez un produit pour commencer.</div>'
        + '</div></div>';
      return;
    }

    var groups = groupStockByProduct(stock, sector);

    /* Tri : ordre manuel (défini par drag) puis alpha si non défini */
    groups.forEach(function(g) {
      g._order = g.product ? storeGetProductOrder(sector.id, g.product.id) : 9999;
    });
    groups.sort(function(a, b) {
      if (a._order !== b._order) return a._order - b._order;
      return (a.product ? a.product.name : '').localeCompare(b.product ? b.product.name : '');
    });

    /* Calcul totalUnits en unités réelles (boîtes × pkgQty + partielles) */
    var totalUnits = groups.reduce(function(s, g) { return s + (g.totalUnitsReal || g.totalQty); }, 0);
    var alertCount = groups.filter(function(g) {
      var exp = g.entries.some(function(e) { return expiryStatus(e.expiry) !== 'ok'; });
      var low = g.product && g.product.alertQtyMin > 0 && g.totalQty <= g.product.alertQtyMin;
      return exp || low;
    }).length;

    /* Filtrer par recherche */
    var filteredGroups = _searchQuery
      ? groups.filter(function(g) {
          var name = g.product ? g.product.name.toLowerCase() : '';
          return name.indexOf(_searchQuery.toLowerCase()) !== -1;
        })
      : groups;

    var html = '<div class="module-content">';
    /* Barre de recherche */
    html += '<div style="display:flex;gap:8px;align-items:center;padding:6px 0 4px">';
    html += '<input type="search" id="stock-search" placeholder="Rechercher un produit…"'
      + ' value="' + escH(_searchQuery) + '"'
      + ' style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;'
      + 'color:var(--text);padding:7px 12px;font-size:12px;outline:none;min-width:0">';
    if (_searchQuery) {
      html += '<button id="btn-search-clear" style="background:none;border:none;color:var(--text3);'
        + 'font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0">×</button>';
    }
    html += '</div>';
    /* Résumé */
    html += '<div style="display:flex;gap:12px;align-items:center;padding:2px 0 4px;flex-wrap:wrap">';
    html += '<span style="font-size:11px;color:var(--text2)">';
    if (_searchQuery) {
      html += filteredGroups.length + ' résultat' + (filteredGroups.length > 1 ? 's' : '') + ' pour « ' + escH(_searchQuery) + ' »';
    } else {
      html += groups.length + ' ref. &mdash; ' + totalUnits + ' unite' + (totalUnits > 1 ? 's' : '');
    }
    html += '</span>';
    if (alertCount > 0 && !_searchQuery) html += '<span class="badge badge-danger">' + alertCount + ' alerte' + (alertCount > 1 ? 's' : '') + '</span>';
    html += '</div>';

    /* Appliquer le filtre recherche */
    var groups = filteredGroups;

    var locations = sector.locations || [];
    if (locations.length > 0) {
      locations.forEach(function(loc) {
        var sublocs = loc.sublocs || [];
        var locId   = 'loc-' + loc.id;

        /* Compter les produits dans cette armoire */
        var locCount = groups.filter(function(g) {
          return g.entries.some(function(e) {
            var l = e.location || {};
            return l.locId === loc.id;
          });
        }).length;
        /* En-tête armoire — affichée même vide (zone de drop) */
        html += '<div class="loc-armoire" data-toggle-loc="' + escH(locId) + '">';
        html += '<span class="loc-armoire-icon">▼</span>';
        html += '<span>📦 ' + escH(loc.name) + '</span>';
        html += '<span style="margin-left:auto;font-size:9px;color:var(--text3)">' + (locCount || 'vide') + (locCount ? ' réf.' : '') + '</span>';
        html += '</div>';
        html += '<div class="loc-content" id="' + escH(locId) + '">';

        if (sublocs.length > 0) {
          /* Niveau 2 : étagères */
          sublocs.forEach(function(sub) {
            var subGroups = groups.filter(function(g) {
              return g.entries.some(function(e) {
                var l = e.location || {};
                return l.locId === loc.id && l.sublocId === sub.id;
              });
            });
            /* Étagère affichée même vide — zone de drop */
            var subId = 'sub-' + loc.id + '-' + sub.id;
            html += '<div class="loc-etagere drop-zone" data-toggle-sub="' + escH(subId) + '"'
              + ' data-drop-loc="' + escH(loc.id) + '/' + escH(sub.id) + '">'
              + '<span class="loc-etagere-icon">▼</span> ' + escH(sub.name)
              + ' <span style="font-size:9px;color:var(--text3);margin-left:6px">' + (subGroups.length || 'vide') + (subGroups.length ? ' réf.' : '') + '</span></div>';
            html += '<div class="loc-sub-content" id="' + escH(subId) + '">';
            subGroups.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
            html += '</div>';
          });
          /* Produits dans l'armoire sans étagère */
          var sublessGroups = groups.filter(function(g) {
            return g.entries.some(function(e) {
              var l = e.location || {};
              return l.locId === loc.id && !l.sublocId;
            });
          });
          if (sublessGroups.length > 0) {
            var sublessId = 'sub-' + loc.id + '-none';
            html += '<div class="loc-etagere drop-zone" data-toggle-sub="' + escH(sublessId) + '"'
              + ' data-drop-loc="' + escH(loc.id) + '/">'
              + '<span class="loc-etagere-icon">▼</span> Sans étagère</div>';
            html += '<div class="loc-sub-content" id="' + escH(sublessId) + '">';
            sublessGroups.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
            html += '</div>';
          }
        } else {
          /* Niveau 1 uniquement */
          var locGroups = groups.filter(function(g) {
            return g.entries.some(function(e) {
              var l = e.location || {};
              return l.locId === loc.id;
            });
          });
          locGroups.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
        }
        html += '</div>'; /* /loc-content */
      });

      /* Produits sans emplacement */
      var unlocated = groups.filter(function(g) {
        return g.entries.every(function(e) { return !e.location || !e.location.locId; });
      });
      if (unlocated.length > 0) {
        html += '<div class="loc-armoire"><span>📦 Sans emplacement</span></div>';
        html += '<div class="loc-content">';
        unlocated.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
        html += '</div>';
      }
    } else {
      var drugs   = groups.filter(function(g) { return g.product && g.product.category === 'drug'; });
      var devices = groups.filter(function(g) { return g.product && g.product.category === 'device'; });
      var other   = groups.filter(function(g) { return !g.product || (g.product.category !== 'drug' && g.product.category !== 'device'); });
      if (drugs.length > 0) {
        html += '<div class="section-title">Medicaments</div>';
        drugs.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
      }
      if (devices.length > 0) {
        html += '<div class="section-title">Dispositifs medicaux</div>';
        devices.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
      }
      if (other.length > 0) {
        html += '<div class="section-title">Autres</div>';
        other.forEach(function(g) { html += renderProductRow(g, sector.mode, sector); });
      }
    }

    html += '</div>';
    container.innerHTML = html;
  }

  /* Regroupe les entrées de stock par productId */
  /* Groupe les entrées de stock par produit.
     totalQty = nombre de BOÎTES (mode box) ou d'UNITÉS (mode unit).
     totalUnitsReal = toujours en unités réelles (boîtes × pkgQty + partielles). */
  function groupStockByProduct(stockList, sector) {
    var map = {};
    stockList.forEach(function(entry) {
      if (!map[entry.productId]) {
        map[entry.productId] = { productId: entry.productId, entries: [] };
      }
      map[entry.productId].entries.push(entry);
    });
    var isBox  = sector && sector.mode === 'box';
    return Object.values(map).map(function(g) {
      g.product  = storeGetProductById(g.productId);
      var pkgQty = g.product ? (g.product.pkgQty || 0) : 0;
      /* totalQty : en mode box = boîtes complètes + fractions pour partielles
         Les entrées partial:true ont qty en UNITÉS, pas en boîtes */
      if (isBox) {
        /* Compter boîtes complètes séparément des partielles */
        var fullBoxes   = g.entries.filter(function(e) { return !e.partial; })
                           .reduce(function(s, e) { return s + (e.qty || 0); }, 0);
        var partialUnits = g.entries.filter(function(e) { return e.partial; })
                           .reduce(function(s, e) { return s + (e.qty || 0); }, 0);
        g.totalQty      = fullBoxes; /* affiché en boîtes */
        g.partialUnits  = partialUnits; /* unités partielles séparées */
        g.totalUnitsReal = fullBoxes * (pkgQty || 1) + partialUnits;
      } else {
        g.totalQty       = g.entries.reduce(function(sum, e) { return sum + (e.qty || 0); }, 0);
        g.partialUnits   = 0;
        g.totalUnitsReal = g.totalQty;
      }
      return g;
    });
  }

  /* Rendu d'une ligne produit */
  function renderProductRow(group, mode, sector) {
    var product = group.product;
    var name    = product ? product.name : '(Produit inconnu)';
    var unit    = product ? (product.unit || 'unite') : 'unite';

    /* Statut peremption : pire lot */
    var worstStatus = 'ok';
    group.entries.forEach(function(e) {
      var s = expiryStatus(e.expiry);
      if (s === 'danger') worstStatus = 'danger';
      else if (s === 'warn' && worstStatus !== 'danger') worstStatus = 'warn';
    });

    var alertQtyMin     = product ? (product.alertQtyMin     || 0) : 0;
    var alertQtyOptimal = product ? (product.alertQtyOptimal || 0) : 0;
    var pkgQtyRow       = product ? (product.pkgQty          || 0) : 0;
    var isZero = group.totalQty === 0 && alertQtyMin > 0;
    var isLow  = alertQtyMin > 0 && group.totalQty > 0 && group.totalQty <= alertQtyMin;
    if (isZero && worstStatus === 'ok') worstStatus = 'zero';
    else if (isLow && worstStatus === 'ok') worstStatus = 'low';

    var rowClass = worstStatus === 'danger' ? 'cell-danger'
                 : worstStatus === 'warn'   ? 'cell-warn'
                 : worstStatus === 'zero'   ? 'cell-zero'
                 : worstStatus === 'low'    ? 'cell-low' : '';

    /* Trier les lots FEFO pour l'affichage */
    var sorted = group.entries.slice().sort(function(a, b) {
      if (!a.expiry && !b.expiry) return 0;
      if (!a.expiry) return 1;
      if (!b.expiry) return -1;
      return a.expiry < b.expiry ? -1 : 1;
    });

    var hasMultiLots = sorted.length > 1;
    var productId = group.productId || (group.product ? group.product.id : '');
    var html = '<div class="settings-card ' + rowClass + '"'
      + ' data-reorder-product="' + escH(productId) + '"'
      + ' style="margin-bottom:6px">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    /* Poignée de drag dédiée (PC + mobile via pointerdown) */
    html += '<span class="drag-handle" draggable="true"'
      + ' data-drag-reorder="' + escH(productId) + '"'
      + ' title="Réordonner"'
      + ' style="color:var(--text2);font-size:18px;cursor:grab;flex-shrink:0;'
      + 'padding:8px 10px;margin:-6px -4px -6px -8px;touch-action:none;'
      + 'display:flex;align-items:center;justify-content:center">&#x2195;</span>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<span style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escH(name) + '</span>';
    if (product) {
      html += '<button class="btn btn-ghost" style="padding:1px 5px;font-size:9px;line-height:1.4;border-radius:4px;flex-shrink:0" data-edit-product-alert="' + escH(product.id) + '" title="Parametres">&#x2699;</button>';
    }
    html += '</div>';
    html += '<div style="font-size:10px;color:var(--text2);margin-top:2px">';
    if (mode === 'box' && pkgQtyRow > 0) {
      var totalU = group.totalQty * pkgQtyRow + (group.partialUnits || 0);
      html += group.totalQty + ' ' + pluralUnit('boite', group.totalQty)
        + ' de ' + pkgQtyRow + ' ' + escH(pluralUnit(unit, pkgQtyRow));
      if (group.partialUnits > 0) {
        html += ' + <span style="color:var(--warn);font-size:10px">' + group.partialUnits
          + ' ' + escH(pluralUnit(unit, group.partialUnits)) + ' (entamée)</span>';
      }
      html += ' <span style="color:var(--text3);font-size:9px">(total : ' + totalU + ' ' + escH(pluralUnit(unit, totalU)) + ')</span>';
    } else if (mode === 'box') {
      html += group.totalQty + ' ' + pluralUnit('boite', group.totalQty);
    } else {
      html += group.totalQty + ' ' + escH(pluralUnit(unit, group.totalQty));
    }
    if (worstStatus === 'danger') html += ' &nbsp;<span class="badge badge-danger">Perime</span>';
    else if (worstStatus === 'warn') html += ' &nbsp;<span class="badge badge-warn">Expire bientot</span>';
    else if (worstStatus === 'low')  html += ' &nbsp;<span class="badge badge-warn">Stock bas</span>';
    html += '</div></div>';

    /* Colonne droite */
    if (!hasMultiLots) {
      var e0 = sorted[0];
      var ec0 = e0.expiry ? expiryStatus(e0.expiry) : 'ok';
      var ecol0 = ec0 === 'danger' ? 'var(--danger)' : ec0 === 'warn' ? 'var(--warn)' : 'var(--text3)';
      /* Colonne droite : lot + péremption toujours visibles */
      html += '<div style="text-align:right;font-size:10px;font-family:monospace;flex-shrink:0">';
      var partBadge0 = e0.partial ? ' <span style="font-size:8px;background:var(--warn);color:#000;padding:1px 4px;border-radius:3px;margin-left:4px">entamée</span>' : '';
      if (e0.lot) html += '<span style="color:var(--text3)">' + escH(e0.lot) + '</span>' + partBadge0 + '<br>';
      if (e0.expiry) html += '<span style="color:' + ecol0 + ';font-weight:600">' + displayDate(e0.expiry) + '</span><br>';
      html += '<button class="btn btn-ghost" style="padding:1px 4px;font-size:9px;margin-top:2px" '
        + 'data-move-entry="' + escH(e0.id) + '" title="Déplacer">⇆ Déplacer</button>';
      html += '</div>';
    } else {
      /* Multi-lots : bouton toggle + résumé péremptions inline */
      var nextExp = sorted.find(function(e) { return e.expiry; });
      var ec1 = nextExp ? expiryStatus(nextExp.expiry) : 'ok';
      var ecol1 = ec1 === 'danger' ? 'var(--danger)' : ec1 === 'warn' ? 'var(--warn)' : 'var(--text3)';
      html += '<div style="text-align:right;flex-shrink:0">';
      if (nextExp) html += '<div style="font-size:10px;font-family:monospace;color:' + ecol1 + ';margin-bottom:2px">' + displayDate(nextExp.expiry) + '</div>';
      html += '<button class="btn btn-ghost btn-sm" data-toggle-lots="' + escH(group.productId) + '">Lots (' + sorted.length + ')</button>';
      html += '</div>';
    }
    html += '</div>';

    /* Zone détail lots FEFO */
    html += '<div id="lots-' + escH(group.productId) + '" style="display:none;margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">';
    sorted.forEach(function(e, i) {
      var es = expiryStatus(e.expiry);
      var ecol = es === 'danger' ? 'var(--danger)' : es === 'warn' ? 'var(--warn)' : 'var(--text3)';
      html += '<div class="entry-draggable" draggable="true"'
        + ' data-drag-entry="' + escH(e.id) + '"'
        + ' style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px' + (i > 0 ? ';border-top:1px solid var(--border)' : '') + '">'
;
      /* Résoudre le libellé d'emplacement */
      var locLabel = '';
      if (e.location && e.location.locId) {
        var locObj = (sector && sector.locations || []).find(function(l) { return l.id === e.location.locId; });
        var subObj = locObj && e.location.sublocId ? (locObj.sublocs || []).find(function(s) { return s.id === e.location.sublocId; }) : null;
        locLabel = locObj ? (subObj ? locObj.name + ' › ' + subObj.name : locObj.name) : '';
      }
      var partialBadge = e.partial ? ' <span style="font-size:8px;background:var(--warn);color:#000;padding:1px 4px;border-radius:3px">entamée</span>' : '';
      html += '<span style="font-family:monospace;font-size:10px;color:var(--text2);flex:1">' + escH(e.lot || '-') + partialBadge + '</span>';
      html += '<span style="font-weight:600">' + (e.qty || 0) + ' ' + escH(pluralUnit(unit, e.qty || 0)) + '</span>';
      html += '<span style="color:' + ecol + ';font-size:10px">' + (e.expiry ? displayDate(e.expiry) : '-') + '</span>';
      if (locLabel) html += '<span style="font-size:9px;color:var(--text3)">' + escH(locLabel) + '</span>';
      if (e.qty > 1) {
        html += '<button class="btn btn-ghost" style="padding:1px 4px;font-size:9px;flex-shrink:0" '
          + 'data-split-entry="' + escH(e.id) + '" title="Répartir">⇆</button>';
      }
      html += '<button class="btn btn-ghost" style="padding:1px 4px;font-size:9px;flex-shrink:0" '
        + 'data-move-entry="' + escH(e.id) + '" title="Déplacer">⇆</button>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
    return html;
  }

  function toggleLotDetail(productId, container) {
    var el = container.querySelector('#lots-' + productId);
    if (!el) return;
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  /* ── Modale édition alerte stock bas d'un produit ── */
  function openProductAlertModal(productId) {
    var product = storeGetProductById(productId);
    if (!product) return;

    var bodyHtml =
      '<div style="font-size:13px;font-weight:600;margin-bottom:12px">' + escH(product.name) + '</div>'
      + '<div class="form-group">'
      + '<label>Seuil bas (alerte)</label>'
      + '<input type="number" id="modal-product-alert-min" inputmode="numeric" value="' + (product.alertQtyMin || 0) + '" min="0">'
      + '<div class="form-hint">Badge rouge si stock ≤ seuil. 0 = désactivé.</div>'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Seuil optimal (commande)</label>'
      + '<input type="number" id="modal-product-alert-opt" inputmode="numeric" value="' + (product.alertQtyOptimal || 0) + '" min="0">'
      + '<div class="form-hint">Stock cible lors de la génération du bon de commande. 0 = non défini.</div>'
      + '</div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-product-alert">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-save-product-alert">Enregistrer</button>';

    var modal = createModal('modal-product-alert', '⚙ Seuils stock', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    modal.addEventListener('click', function(e) {
      if (e.target.id !== 'btn-save-product-alert') return;
      var minInput = document.getElementById('modal-product-alert-min');
      var optInput = document.getElementById('modal-product-alert-opt');
      product.alertQtyMin     = minInput ? Math.max(0, parseInt(minInput.value, 10) || 0) : product.alertQtyMin;
      product.alertQtyOptimal = optInput ? Math.max(0, parseInt(optInput.value, 10) || 0) : (product.alertQtyOptimal || 0);

      fsScheduleSave();
      closeModal('modal-product-alert');

  /* Déplacement via bouton — select destination + quantité (tout ou partiel) */
  function openMoveFromButton(entryId, sectorId) {

    var entry = storeGetStockBySector(sectorId).find(function(e) { return e.id === entryId; });
    if (!entry) return;
    var locs = sector.locations || [];
    if (locs.length === 0) {
      showToast('Aucun emplacement défini dans ce secteur', 'warn'); return;
    }
    var srcKey = entry.location && entry.location.locId
      ? entry.location.locId + '/' + (entry.location.sublocId || '') : '';
    var opts = '<option value="">— Choisir —</option>';

        });
      }
      var locVal = loc.id + '/';
      if (locVal !== srcKey)
        opts += '<option value="' + escH(locVal) + '">' + escH(loc.name) + '</option>';
    });

    var prod = storeGetProductById(entry.productId);
    var unit = prod ? (prod.unit || 'u') : 'u';
    var prodName = prod ? prod.name : '(inconnu)';
    var bodyHtml =
      '<div style="font-size:12px;font-weight:600;margin-bottom:10px">' + escH(prodName + (entry.lot ? ' — Lot ' + entry.lot : '')) + '</div>'
      + '<div class="form-group"><label>Vers</label><select id="mvb-dest">' + opts + '</select></div>'
      + '<div class="form-group"><label>Quantité</label>'
      + '<input type="number" id="mvb-qty" inputmode="numeric" value="' + entry.qty + '" min="1" max="' + entry.qty + '"'
      + ' style="text-align:center;font-size:18px;font-weight:700">'
      + '<div class="form-hint">Max : ' + entry.qty + ' ' + escH(pluralUnit(unit, entry.qty)) + '</div></div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-mvb">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-mvb-confirm">Déplacer</button>';

    var modal = createModal('modal-mvb', '⇆ Déplacer', bodyHtml, footerHtml, 'sm');
    if (!modal) return;
    setTimeout(function() { var i = document.getElementById('mvb-qty'); if (i) { i.focus(); i.select(); } }, 60);

    modal.addEventListener('click', function(e) {
      if (e.target.id !== 'btn-mvb-confirm') return;
      var destSel = document.getElementById('mvb-dest');
      var qtyInp  = document.getElementById('mvb-qty');
      var destRaw = destSel ? destSel.value : '';
      var moveQty = qtyInp ? Math.max(1, Math.min(parseInt(qtyInp.value, 10) || 1, entry.qty)) : entry.qty;
      if (!destRaw) { showToast('Sélectionnez un emplacement', 'warn'); return; }
      var destParts = destRaw.split('/');
      var destLoc   = destParts[0] ? { locId: destParts[0], sublocId: destParts[1] || '' } : '';
      var moveAll   = moveQty >= entry.qty;
      closeModal('modal-mvb');
      if (moveAll) {
        var ex = _findStockEntry(sectorId, entry.productId, entry.lot, entry.expiry, destLoc);
        if (ex && ex.id !== entry.id) {
          ex.qty += entry.qty; ex._updatedAt = Date.now();
          storeUpsertStockEntry(ex); storeDeleteStockEntry(entry.id);
        } else {
          entry.location = destLoc; entry._updatedAt = Date.now();
          storeUpsertStockEntry(entry);
        }
      } else {
        var ex2 = _findStockEntry(sectorId, entry.productId, entry.lot, entry.expiry, destLoc);
        if (ex2 && ex2.id !== entry.id) {
          ex2.qty += moveQty; ex2._updatedAt = Date.now(); storeUpsertStockEntry(ex2);
        } else {
          storeUpsertStockEntry({ id: genId(), sectorId: sectorId, productId: entry.productId,
            lot: entry.lot, expiry: entry.expiry, qty: moveQty, partial: entry.partial || false,
            location: destLoc, _updatedAt: Date.now(), _deletedAt: null });
        }
        entry.qty -= moveQty; entry._updatedAt = Date.now();
        if (entry.qty <= 0) storeDeleteStockEntry(entry.id);
        else storeUpsertStockEntry(entry);
      }
      fsScheduleSave(); renderSectorContent();
      showToast('Déplacement effectué', 'success');
    });
  }

  /* ── Modale répartition d'une entrée de stock ──
     Split : source qty -= n, destination (même lot+exp, emplacement différent) qty += n

  function openSplitModal(entryId, sectorId) {
    var sector = storeGetSectorById(sectorId);

            + escH(loc.name) + ' › ' + escH(sub.name) + '</option>';

      opts += '<option value="' + escH(loc.id) + '/">' + escH(loc.name) + '</option>';

    var bodyHtml =
      '<div style="font-size:12px;font-weight:600;margin-bottom:10px">' + escH(prodName + lotInfo) + '</div>'

      + '<div class="form-group">'
      + '<label>Quantité à répartir</label>'
      + '<input type="number" id="split-qty" inputmode="numeric" value="1" min="1" max="' + (entry.qty - 1) + '" style="text-align:center;font-size:20px;font-weight:700">'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Vers l\'emplacement</label>'
      + '<select id="split-location">' + opts + '</select>'
      + '</div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-split">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-confirm-split">⇆ Répartir</button>';

    var modal = createModal('modal-split', '⇆ Répartition', bodyHtml, footerHtml, 'sm');

    setTimeout(function() {
      var inp = document.getElementById('split-qty');
      if (inp) { inp.focus(); inp.select(); }
    }, 60);

    modal.addEventListener('click', function(e) {
      if (e.target.id !== 'btn-confirm-split') return;

      var qtyInput  = document.getElementById('split-qty');
      var locSelect = document.getElementById('split-location');
      var splitQty  = qtyInput  ? Math.max(1, parseInt(qtyInput.value, 10) || 1) : 1;
      var locRaw    = locSelect ? locSelect.value : '';

      if (!locRaw) { showToast('Sélectionnez un emplacement', 'warn'); return; }
      if (splitQty >= entry.qty) { showToast('La quantité doit être inférieure au stock disponible', 'warn'); return; }

      var parts   = locRaw.split('/');
      var destLoc = parts[0] ? { locId: parts[0], sublocId: parts[1] || '' } : '';

      /* Chercher une entrée existante à destination */
      var destEntry = _findStockEntry(sectorId, entry.productId, entry.lot, entry.expiry, destLoc);

      if (destEntry) {
        destEntry.qty += splitQty;
        destEntry._updatedAt = Date.now();
        storeUpsertStockEntry(destEntry);
      } else {
        storeUpsertStockEntry({
          id:         genId(),
          sectorId:   sectorId,
          productId:  entry.productId,
          lot:        entry.lot,
          expiry:     entry.expiry,
          qty:        splitQty,
          location:   destLoc,
          _updatedAt: Date.now(),
          _deletedAt: null
        });
      }

      /* Réduire la source */
      entry.qty -= splitQty;
      entry._updatedAt = Date.now();
      storeUpsertStockEntry(entry);

      fsScheduleSave();
      closeModal('modal-split');
      renderSectorContent();
      showToast('⇆ ' + splitQty + ' ' + unit + ' réparti(s)', 'success');
    });
  }


  /* ── Drag and drop emplacement ──
     Pointer Events API — fonctionne PC et mobile, bloque menu natif Android */
  function _initDragDrop(container, sector) {
    var sectorId  = sector.id;
    var _drag     = null; /* { entryId, startX, startY, moved, ghost, pointerId, el } */

    /* Bloquer menu contextuel natif */
    container.addEventListener('contextmenu', function(e) {
      if (e.target.closest('[data-drag-entry]')) e.preventDefault();
    });

    /* ── Pointer Events (PC + Mobile) ── */
    container.addEventListener('pointerdown', function(e) {
      var el = e.target.closest('[data-drag-entry]');
      if (!el) return;
      if (e.button && e.button !== 0) return; /* clic droit PC ignoré */
      e.preventDefault();
      try { el.setPointerCapture(e.pointerId); } catch(ex) {}
      _drag = {
        entryId:   el.dataset.dragEntry,
        startX:    e.clientX,
        startY:    e.clientY,
        moved:     false,
        ghost:     null,
        pointerId: e.pointerId,
        el:        el
      };
    });

    container.addEventListener('pointermove', function(e) {
      if (!_drag || e.pointerId !== _drag.pointerId) return;
      var dx = e.clientX - _drag.startX;
      var dy = e.clientY - _drag.startY;
      if (!_drag.moved && Math.sqrt(dx*dx + dy*dy) < 8) return;
      _drag.moved = true;
      e.preventDefault();

      /* Indicateur visuel réordonnement */
      if (_drag.reorderProductId) {
        container.querySelectorAll('.reorder-drop-before,.reorder-drop-after')
          .forEach(function(el) { el.classList.remove('reorder-drop-before','reorder-drop-after'); });
        var under = document.elementFromPoint(e.clientX, e.clientY);
        var targetCard = under && under.closest('[data-reorder-product]');
        if (targetCard && targetCard.dataset.reorderProduct !== _drag.reorderProductId) {
          var rect = targetCard.getBoundingClientRect();
          targetCard.classList.add(e.clientY < rect.top + rect.height / 2
            ? 'reorder-drop-before' : 'reorder-drop-after');
        }
        if (!_drag.ghost) {
        var orig = container.querySelector('[data-drag-entry="' + _drag.entryId + '"]');
        var ghost = document.createElement('div');
        ghost.style.cssText = 'position:fixed;z-index:99990;opacity:.75;pointer-events:none;'
          + 'background:var(--surface2);border:1px solid var(--accent);border-radius:6px;'
          + 'padding:4px 10px;font-size:11px;color:var(--text);white-space:nowrap;';
        ghost.textContent = orig ? orig.textContent.trim().slice(0,30) : '⊕';
        document.body.appendChild(ghost);
        _drag.ghost = ghost;
        if (orig) orig.classList.add('entry-dragging');
      }
      _drag.ghost.style.left = (e.clientX + 12) + 'px';
      _drag.ghost.style.top  = (e.clientY - 20) + 'px';
        } /* fin if reorderProductId */

      /* Highlight drop-zone sous le pointeur */
      if (!_drag.reorderProductId) {
      container.querySelectorAll('.drag-over').forEach(function(z) { z.classList.remove('drag-over'); });
      var under = document.elementFromPoint(e.clientX, e.clientY);
      var zone = under && under.closest('[data-drop-loc]');
      if (zone) zone.classList.add('drag-over');
      } /* fin if !reorderProductId */
    });

    container.addEventListener('pointerup', function(e) {
      if (!_drag || e.pointerId !== _drag.pointerId) return;
      var wasMoved = _drag.moved;
      var reorderProductId = _drag.reorderProductId;
      var entryId = _drag.entryId;
      _cleanup();
      if (!wasMoved) { _drag = null; return; }
      var under = document.elementFromPoint(e.clientX, e.clientY);
      if (reorderProductId) {
        var targetCard = under && under.closest('[data-reorder-product]');
        if (targetCard && targetCard.dataset.reorderProduct !== reorderProductId) {
          _applyReorder(reorderProductId, targetCard.dataset.reorderProduct, targetCard, sector);
        }
        container.querySelectorAll('.reorder-drop-before,.reorder-drop-after')
          .forEach(function(el) { el.classList.remove('reorder-drop-before','reorder-drop-after'); });
      } else {
        var zone = under && under.closest('[data-drop-loc]');
        if (zone) openMoveModal(entryId, zone.dataset.dropLoc, sectorId);
      }
      _drag = null;
    });

    container.addEventListener('pointercancel', function(e) {
      if (!_drag || e.pointerId !== _drag.pointerId) return;
      _cleanup();
      _drag = null;
    });

    /* ── PC : drag events natifs ── */
    container.addEventListener('dragstart', function(e) {
      /* Drag d'une entrée de lot (changement emplacement) */
      var el = e.target.closest('[data-drag-entry]');
      if (el) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', el.dataset.dragEntry);
        el.classList.add('entry-dragging');
        return;
      }
      /* Drag via poignée (réordonnement) */
      var handle = e.target.closest('[data-drag-reorder]');
      if (handle) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('reorder-product', handle.dataset.dragReorder);
        var card = handle.closest('[data-reorder-product]');
        if (card) card.style.opacity = '.4';
      }
    });
    container.addEventListener('dragend', function(e) {
      var el = e.target.closest('[data-drag-entry]');
      if (el) el.classList.remove('entry-dragging');
      var cardEnd = e.target.closest('[data-reorder-product]')
        || (e.target.closest('[data-drag-reorder]') && e.target.closest('[data-drag-reorder]').closest('[data-reorder-product]'));
      if (cardEnd) cardEnd.style.opacity = '';
      container.querySelectorAll('.reorder-drop-before,.reorder-drop-after')
        .forEach(function(el2) { el2.classList.remove('reorder-drop-before','reorder-drop-after'); });
    });
    container.addEventListener('dragover', function(e) {
      var zone = e.target.closest('[data-drop-loc]');
      if (zone) {
        e.preventDefault();
        zone.classList.add('drag-over');
      }
    });
    container.addEventListener('dragleave', function(e) {
      var zone = e.target.closest('[data-drop-loc]');
      if (zone) zone.classList.remove('drag-over');
    });
    container.addEventListener('drop', function(e) {
      /* Drop sur emplacement (armoire/étagère) */
      var zone = e.target.closest('[data-drop-loc]');
      if (zone) {
        e.preventDefault();
        zone.classList.remove('drag-over');
        var entryId = e.dataTransfer.getData('text/plain');
        if (entryId) openMoveModal(entryId, zone.dataset.dropLoc, sectorId);
        return;
      }
      /* Drop sur produit (réordonnement) */
      var targetCard = e.target.closest('[data-reorder-product]');
      if (targetCard) {
        e.preventDefault();
        var srcProductId = e.dataTransfer.getData('reorder-product');
        var dstProductId = targetCard.dataset.reorderProduct;
        if (srcProductId && srcProductId !== dstProductId) {
          _applyReorder(srcProductId, dstProductId, targetCard, sector);
        }
        container.querySelectorAll('.reorder-drop-before,.reorder-drop-after')
          .forEach(function(el) { el.classList.remove('reorder-drop-before','reorder-drop-after'); });
      }
    });

    /* Dragover sur produit — indicateur visuel position */
    container.addEventListener('dragover', function(e) {
      var targetCard = e.target.closest('[data-reorder-product]');
      if (!targetCard) return;
      e.preventDefault();
      container.querySelectorAll('.reorder-drop-before,.reorder-drop-after')
        .forEach(function(el) { el.classList.remove('reorder-drop-before','reorder-drop-after'); });
      var rect   = targetCard.getBoundingClientRect();
      var isTop  = e.clientY < rect.top + rect.height / 2;
      targetCard.classList.add(isTop ? 'reorder-drop-before' : 'reorder-drop-after');
    });

    function _cleanup() {
      if (_drag && _drag.ghost) _drag.ghost.remove();
      if (_drag && _drag.el) _drag.el.classList.remove('entry-dragging');
      container.querySelectorAll('.drag-over').forEach(function(z) { z.classList.remove('drag-over'); });
    }
  }

  /* ── Modale déplacement ── */
  function openMoveModal(entryId, destLocRaw, sectorId) {
    var sector = storeGetSectorById(sectorId);
    if (!sector) return;
    var entry = storeGetStockBySector(sectorId).find(function(e) { return e.id === entryId; });
    if (!entry) return;
    var prod = storeGetProductById(entry.productId);
    var unit = prod ? (prod.unit || 'u') : 'u';

    var destParts = destLocRaw ? destLocRaw.split('/') : [];
    var destLoc   = destParts[0] ? { locId: destParts[0], sublocId: destParts[1] || '' } : '';

    /* Label destination */
    var destLabel = 'Sans emplacement';
    if (destParts[0]) {
      var locObj = (sector.locations || []).find(function(l) { return l.id === destParts[0]; });
      if (locObj) {
        destLabel = locObj.name;
        if (destParts[1]) {
          var subObj = (locObj.sublocs || []).find(function(s) { return s.id === destParts[1]; });
          if (subObj) destLabel += ' › ' + subObj.name;
        }
      }
    }

    /* Vérifier source ≠ destination */
    var srcKey  = entry.location && entry.location.locId ? entry.location.locId + '/' + (entry.location.sublocId || '') : '';
    var destKey = destLocRaw || '';
    if (srcKey === destKey) { showToast('Déjà à cet emplacement', 'warn'); return; }

    var prodName = prod ? prod.name : '(inconnu)';
    var lotInfo  = entry.lot ? ' — Lot ' + entry.lot : '';
    var bodyHtml =
      '<div style="font-size:12px;font-weight:600;margin-bottom:4px">' + escH(prodName + lotInfo) + '</div>'
      + '<div style="font-size:11px;color:var(--text2);margin-bottom:14px">Vers : <strong>' + escH(destLabel) + '</strong></div>'
      + '<div style="display:flex;gap:10px;margin-bottom:12px">'
      + '<button class="btn btn-secondary" id="btn-move-all" style="flex:1">Tout (' + entry.qty + ' ' + escH(pluralUnit(unit, entry.qty)) + ')</button>'
      + '<button class="btn btn-secondary" id="btn-move-partial" style="flex:1">Partiel</button>'
      + '</div>'
      + '<div id="move-qty-block" style="display:none">'
      + '<div class="form-group" style="max-width:140px;margin:0 auto">'
      + '<label style="text-align:center">Quantité</label>'
      + '<input type="number" id="move-qty-input" inputmode="numeric" value="1" min="1"'
      + ' max="' + (entry.qty - 1) + '" style="text-align:center;font-size:22px;font-weight:700">'
      + '<div class="form-hint" style="text-align:center">Max : ' + (entry.qty - 1) + '</div>'
      + '</div></div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-move">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-move-confirm">Déplacer</button>';

    var modal = createModal('modal-move', '⇆ Déplacer', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    var _moveAll = true;

    modal.addEventListener('click', function(e) {
      if (e.target.id === 'btn-move-all') {
        _moveAll = true;
        document.getElementById('move-qty-block').style.display = 'none';
        e.target.classList.add('btn-primary'); e.target.classList.remove('btn-secondary');
        var pb = document.getElementById('btn-move-partial');
        if (pb) { pb.classList.remove('btn-primary'); pb.classList.add('btn-secondary'); }
      }
      if (e.target.id === 'btn-move-partial') {
        _moveAll = false;
        document.getElementById('move-qty-block').style.display = '';
        e.target.classList.add('btn-primary'); e.target.classList.remove('btn-secondary');
        var ab = document.getElementById('btn-move-all');
        if (ab) { ab.classList.remove('btn-primary'); ab.classList.add('btn-secondary'); }
        setTimeout(function() { var inp = document.getElementById('move-qty-input'); if (inp) { inp.focus(); inp.select(); } }, 50);
      }
      if (e.target.id === 'btn-move-confirm') {
        var moveQty;
        if (_moveAll) {
          moveQty = entry.qty;
        } else {
          var inp = document.getElementById('move-qty-input');
          moveQty = inp ? Math.max(1, parseInt(inp.value, 10) || 1) : 1;
          if (moveQty >= entry.qty) { showToast('Quantité inférieure au stock source requise', 'warn'); return; }
        }
        closeModal('modal-move');
        if (_moveAll) {
          var existing = _findStockEntry(sectorId, entry.productId, entry.lot, entry.expiry, destLoc);
          if (existing && existing.id !== entry.id) {
            existing.qty += entry.qty; existing._updatedAt = Date.now();
            storeUpsertStockEntry(existing); storeDeleteStockEntry(entry.id);
          } else {
            entry.location = destLoc; entry._updatedAt = Date.now();
            storeUpsertStockEntry(entry);
          }
        } else {
          var existing2 = _findStockEntry(sectorId, entry.productId, entry.lot, entry.expiry, destLoc);
          if (existing2 && existing2.id !== entry.id) {
            existing2.qty += moveQty; existing2._updatedAt = Date.now();
            storeUpsertStockEntry(existing2);
          } else {
            storeUpsertStockEntry({ id: genId(), sectorId: sectorId, productId: entry.productId,
              lot: entry.lot, expiry: entry.expiry, qty: moveQty, partial: entry.partial || false,
              location: destLoc, _updatedAt: Date.now(), _deletedAt: null });
          }
          entry.qty -= moveQty; entry._updatedAt = Date.now();
          if (entry.qty <= 0) storeDeleteStockEntry(entry.id);
          else storeUpsertStockEntry(entry);
        }
        fsScheduleSave(); renderSectorContent();
        showToast('Déplacement effectué', 'success');
      }
    });
  }

  /* Réordonner srcProduct avant/après dstProduct dans le secteur */
  function _applyReorder(srcProductId, dstProductId, targetCard, sector) {
    /* Récupérer tous les groupes dans l'ordre actuel */
    var stock  = storeGetStockBySector(sector.id);
    var groups = groupStockByProduct(stock, sector);
    groups.forEach(function(g) {
      g._order = g.product ? storeGetProductOrder(sector.id, g.product.id) : 9999;
    });
    groups.sort(function(a, b) {
      if (a._order !== b._order) return a._order - b._order;
      return (a.product ? a.product.name : '').localeCompare(b.product ? b.product.name : '');
    });

    /* Retirer srcProduct de la liste */
    var ordered = groups.map(function(g) { return g.product ? g.product.id : ''; });
    ordered = ordered.filter(function(id) { return id !== srcProductId; });

    /* Insérer avant ou après dstProduct */
    var dstIdx = ordered.indexOf(dstProductId);
    var rect   = targetCard.getBoundingClientRect();
    var lastY  = parseFloat(targetCard.dataset.lastDragY || '0');
    /* Utiliser la classe CSS pour déterminer avant/après */
    var insertAfter = targetCard.classList.contains('reorder-drop-after');
    if (dstIdx === -1) {
      ordered.push(srcProductId);
    } else {
      ordered.splice(insertAfter ? dstIdx + 1 : dstIdx, 0, srcProductId);
    }

    /* Sauvegarder le nouvel ordre */
    ordered.forEach(function(productId, i) {
      if (productId) storeSetProductOrder(sector.id, productId, i);
    });
    fsScheduleSave();
    renderSectorContent();
  }

  window.openMoveModal  = openMoveModal;
  window._initDragDrop  = _initDragDrop;

  window.groupStockByProduct  = groupStockByProduct;

}());

  /* ── Sauvegarder un secteur (création ou édition) ── */
  function saveSector(sectorId) {
    var nameInput = document.getElementById('modal-sector-name');
    var modeInput = document.getElementById('modal-sector-mode');


    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) { showToast('Le nom est requis', 'danger'); return; }

    var existing = sectorId ? storeGetSectorById(sectorId) : null;
    /* Mode : lu depuis le select uniquement à la création */
    var modeVal = (!existing && modeInput) ? modeInput.value : (existing ? existing.mode : 'unit');
    var sector = existing ? Object.assign({}, existing) : {
      id: genId(),
      locations: [],
      _deletedAt: null
    };

    sector.name       = name;
    sector.mode       = modeInput ? modeInput.value : 'unit';


    storeUpsertSector(sector);
    fsScheduleSave();
    closeModal('modal-sector');
    renderSettings();
    renderSectorNav();
    showToast(existing ? 'Secteur modifié' : 'Secteur créé', 'success');
  }

  /* ── Ajouter un emplacement (dans la modale édition) ── */

  /* Déplace une armoire vers le haut ou le bas dans sector.locations[] */
  function moveLocation(sectorId, locId, direction) {
    var sector = storeGetSectorById(sectorId);
    if (!sector || !sector.locations) return;
    var locs = sector.locations;
    var idx  = locs.findIndex(function(l) { return l.id === locId; });
    if (idx === -1) return;
    var swap = direction === 'up' ? idx - 1 : idx + 1;
    if (swap < 0 || swap >= locs.length) return;
    var tmp  = locs[idx]; locs[idx] = locs[swap]; locs[swap] = tmp;
    sector._updatedAt = Date.now();
    storeUpsertSector(sector);
    fsScheduleSave();
  }

  /* Déplace une étagère vers le haut ou le bas dans loc.sublocs[] */
  function moveSublocation(sectorId, locId, subId, direction) {
    var sector = storeGetSectorById(sectorId);
    if (!sector || !sector.locations) return;
    var loc  = sector.locations.find(function(l) { return l.id === locId; });
    if (!loc || !loc.sublocs) return;
    var subs = loc.sublocs;
    var idx  = subs.findIndex(function(s) { return s.id === subId; });
    if (idx === -1) return;
    var swap = direction === 'up' ? idx - 1 : idx + 1;
    if (swap < 0 || swap >= subs.length) return;
    var tmp  = subs[idx]; subs[idx] = subs[swap]; subs[swap] = tmp;
    sector._updatedAt = Date.now();
    storeUpsertSector(sector);
    fsScheduleSave();
  }

  function addLocationToModal(sectorId) {
    var input = document.getElementById('modal-new-location');
    if (!input || !input.value.trim()) return;
    var sector = sectorId ? storeGetSectorById(sectorId) : null;
    if (!sector) return;
    sector.locations = sector.locations || [];
    sector.locations.push({ id: genId(), name: input.value.trim(), sublocs: [] });
    storeUpsertSector(sector);
    fsScheduleSave();
    closeModal('modal-sector');
    openSectorModal(sectorId);
    showToast('Emplacement ajouté');
  }

  /* ── Ajouter un sous-emplacement ── */

    var loc = (sector.locations || []).find(function(l) { return l.id === locId; });
    if (!loc) return;
    loc.sublocs = loc.sublocs || [];
    loc.sublocs.push({ id: genId(), name: input.value.trim() });

    fsScheduleSave();
    closeModal('modal-sector');
    openSectorModal(sectorId);
    showToast('Sous-emplacement ajouté');

  /* ── Supprimer un sous-emplacement ── */
  function removeSublocationFromSector(sectorId, locId, sublocId) {
    var sector = storeGetSectorById(sectorId);
    if (!sector) return;
    var loc = (sector.locations || []).find(function(l) { return l.id === locId; });
    if (!loc) return;
    loc.sublocs = (loc.sublocs || []).filter(function(s) { return s.id !== sublocId; });

  /* ── Supprimer un emplacement ── */
  function removeLocationFromSector(sectorId, locationId) {
    var sector = storeGetSectorById(sectorId);

    sector.locations = (sector.locations || []).filter(function(l) { return l.id !== locationId; });

  /* ── Supprimer un secteur avec confirmation ── */

  /* renderSettings public : rend dans le container legacy (onglet) si présent,
