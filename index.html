  /* ── Modale correction manuelle de stock ── */
  function openStockFixModal() {
    var sectors = storeGetSectors().filter(function(s) { return s.id !== 'global'; });
    var sectorOpts = sectors.map(function(s) {
      return '<option value="' + escH(s.id) + '">' + escH(s.name) + '</option>';
    }).join('');
    if (!sectorOpts) { showToast('Aucun secteur disponible', 'warn'); return; }

    var bodyHtml =
      '<div class="form-group">'
      + '<label>Secteur</label>'
      + '<select id="fix-sector">' + sectorOpts + '</select>'
      + '</div>'
      + '<div id="fix-product-list" style="margin-top:8px"></div>';

    var footerHtml = '<button class="btn btn-secondary" data-close-modal="modal-stock-fix">Fermer</button>';
    var modal = createModal('modal-stock-fix', '\u{1F527} Correction de stock', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    function loadProducts() {
      var sectorEl = document.getElementById('fix-sector');
      var sectorId = sectorEl ? sectorEl.value : null;
      if (!sectorId) return;
      var stock = storeGetStockBySector(sectorId);
      var list  = document.getElementById('fix-product-list');
      if (!list) return;
      if (stock.length === 0) {
        list.innerHTML = '<div style="font-size:11px;color:var(--text3)">Stock vide dans ce secteur.</div>';
        return;
      }
      var html = '<div style="font-size:11px;color:var(--text2);margin-bottom:8px">'
        + 'Saisissez la quantit\u00e9 \u00e0 <strong>retirer</strong> puis cliquez \u2715.'
        + '</div>';
      stock.forEach(function(e) {
        var prod = storeGetProductById(e.productId);
        var name = prod ? prod.name : '(inconnu)';
        var unit = prod ? (prod.unit || 'u') : 'u';
        var lot  = e.lot    ? ' \u2014 Lot '  + e.lot                : '';
        var exp  = e.expiry ? ' \u2014 Exp. ' + displayDate(e.expiry) : '';
        html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">';
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escH(name) + '</div>';
        html += '<div style="font-size:10px;color:var(--text3)">En stock\u00a0: ' + e.qty + '\u00a0' + escH(unit) + escH(lot + exp) + '</div>';
        html += '</div>';
        /* Input = quantite A RETIRER, defaut = totalite de l entree */
        html += '<input type="number" id="fix-qty-' + escH(e.id) + '" value="' + e.qty + '" min="1" max="' + e.qty + '" inputmode="numeric"'
          + ' style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:12px;text-align:center">';
        html += '<button class="btn btn-danger btn-sm" data-fix-entry="' + escH(e.id) + '" data-fix-sector="' + escH(sectorId) + '" title="Retirer">\u2715</button>';
        html += '</div>';
      });
      list.innerHTML = html;
    }

    loadProducts();

    modal.addEventListener('change', function(e) {
      if (e.target.id === 'fix-sector') loadProducts();
    });

    modal.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-fix-entry]');
      if (!btn) return;

      var entryId  = btn.dataset.fixEntry;
      var sectorId = btn.dataset.fixSector;
      var qtyInput = document.getElementById('fix-qty-' + entryId);
      var entry    = storeGetStockBySector(sectorId).find(function(s) { return s.id === entryId; });
      if (!entry) return;

      /* Quantite a retirer, bornee au stock disponible */
      var qtyToRemove = qtyInput ? Math.max(1, parseInt(qtyInput.value, 10) || 1) : entry.qty;
      qtyToRemove = Math.min(qtyToRemove, entry.qty);

      var prod = storeGetProductById(entry.productId);
      var unit = prod ? (prod.unit || 'u') : 'u';
      var msg  = 'Retirer ' + qtyToRemove + '\u00a0' + unit
        + ' de \u00ab\u00a0' + (prod ? prod.name : '?') + '\u00a0\u00bb ?'
        + (qtyToRemove === entry.qty ? '\n\nL\'entr\u00e9e sera supprim\u00e9e du stock.' : '');

      if (!confirm(msg)) return;

      /* newQty calcule AVANT modification de entry — evite qty=0 dans le mouvement */
      var newQty = entry.qty - qtyToRemove;

      storeAddMovement({
        type:           'out',
        subtype:        'correction',
        sectorId:       sectorId,
        targetSectorId: null,
        productId:      entry.productId,
        lot:            entry.lot,
        expiry:         entry.expiry,
        qty:            qtyToRemove,
        note:           'Correction manuelle'
      });

      if (newQty <= 0) {
        storeDeleteStockEntry(entry.id); /* préservé si alertQtyMin > 0 */
      } else {
        entry.qty        = newQty;
        entry._updatedAt = Date.now();
        storeUpsertStockEntry(entry);
      }
      fsScheduleSave();
      renderSectorContent();
      loadProducts();
      showToast('\u2212\u00a0' + qtyToRemove + '\u00a0' + unit + ' retir\u00e9(s)', 'success');
    });
  }

  window.renderSettings    = renderSettings;
  window.openSettingsModal = openSettingsModal;

}());


/* =====================================================================
   6b. SCAN MODULE
   Gestion de la caméra, décodage datamatrix GS1, lookup produit,
   popup quantité et popup création manuelle.
   Scan vidéo natif : getUserMedia + BarcodeDetector RAF 60fps.
   Fallback saisie manuelle si caméra indisponible.
   ===================================================================== */
(function() {
  'use strict';

  /* ── Constantes ── */
  var GUDID_API_BASE  = 'https://accessgudid.nlm.nih.gov/api/v3/devices/lookup.json?di=';
  var GIYGAS_API_BASE = 'https://medicaments-api.giygas.dev/v1/medicaments';
  var SCAN_BEEP_FREQ = 880;
  var SCAN_BEEP_MS   = 80;

  /* ── État interne ── */
  var _scanMulti     = false;   /* mode mouvements multiples */
  var _autoRescan    = false;   /* relance auto (inventaire/purge/commande) */
  var _scanContext   = null;    /* 'add' | 'transfer' | 'out' */
  var _scanSubtype   = null;    /* pour 'out' : 'delivery' | 'destruction' */
  var _scanTarget    = null;    /* sectorId destination (pour transfer) */
  var _pendingScan   = null;    /* résultat GS1 en attente de confirmation */
  var _outMode       = null;    /* 'box' | 'partial' pour les sorties en mode boîte */
  var _scanOutMode   = 'box';   /* 'box' | 'partial' pour la délivrance */

  /* Scan disponible : getUserMedia + BarcodeDetector (Chrome Android, Safari 17+) */
  function isBarcodeDetectorAvailable() {
    return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  }

  /* ── Bip sonore de confirmation ── */
  function playBeep() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = SCAN_BEEP_FREQ;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + SCAN_BEEP_MS / 1000);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + SCAN_BEEP_MS / 1000);
    } catch(e) {}
    if (navigator.vibrate) navigator.vibrate(40);
  }

  /* ── Démarrer le scan caméra ── */
  /* Démarrer un scan.
     Si getUserMedia disponible : ouvre le scan vidéo natif.
     Sinon : saisie manuelle. */
  function startScan(context, subtype, targetSectorId, autoRescan) {
    _scanContext = context;
    _scanSubtype = subtype || null;
    _scanTarget  = targetSectorId || null;
    _autoRescan  = !!autoRescan;
    var isMaster = window.deployGetMode && window.deployGetMode() === 'master';
    if (isMaster) { openManualEntryModal(null); return; }
    _openVideoScan();
  }

  /* Scan vidéo natif : getUserMedia + BarcodeDetector RAF 60fps */

  var _videoStream  = null;   /* MediaStream actif */
  var _rafHandle    = null;   /* requestAnimationFrame handle */
  var _detectBusy   = false;  /* verrou : une détection à la fois */
  var _lastDetect   = 0;      /* throttle 15fps */
  var _scanTrack    = null;
  var _torchOn      = false;
  var _scanCanvas   = null;   /* canvas réutilisé entre frames */
  var _scanCtx      = null;

  /* BarcodeDetector instancié une seule fois */
  var _nativeDetector = null;
  function _getNativeDetector() {
    if (_nativeDetector) return _nativeDetector;
    if (!isBarcodeDetectorAvailable()) return null;
    try {
      _nativeDetector = new BarcodeDetector({
        formats: ['data_matrix', 'qr_code', 'code_128', 'ean_13', 'ean_8', 'itf']
      });
    } catch(e) { _nativeDetector = null; }
    return _nativeDetector;
  }


  /* ── Ouvrir la modale vidéo et démarrer le stream ── */
  function _openVideoScan() {
    var modal = document.getElementById('modal-video-scan');
    var video = document.getElementById('scan-video');
    if (!modal || !video) { openManualEntryModal(null); return; }

    modal.classList.add('open');
    _setVideoStatus('Démarrage caméra…');

    var constraints = {
      video: {
        facingMode:  { ideal: 'environment' },
        width:       { ideal: 1920 },
        height:      { ideal: 1080 }
      }
    };

    navigator.mediaDevices.getUserMedia(constraints)
      .catch(function() {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      })
      .then(function(stream) {
        _videoStream = stream;
        video.srcObject = stream;
        video.play();
        video.addEventListener('loadedmetadata', function() {
          var track = stream.getVideoTracks()[0];
          var s = track ? track.getSettings() : {};
          _setVideoStatus((s.width || '?') + '×' + (s.height || '?'));
          setTimeout(function() { _setVideoStatus(''); }, 2000);
          /* Autofocus continu */
          if (track && track.applyConstraints) {
            track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] })
              .catch(function() {});
          }
          _scanTrack = track;
          /* Canvas réutilisable aux dimensions exactes de la vidéo */
          _scanCanvas = document.createElement('canvas');
          _scanCanvas.width  = video.videoWidth;
          _scanCanvas.height = video.videoHeight;
          _scanCtx = _scanCanvas.getContext('2d', { willReadFrequently: true });
          _startRAFLoop();
        }, { once: true });
      })
      .catch(function(err) {
        window.dbg('getUserMedia erreur: ' + err.message, 'warn');
        _closeVideoScan();
        showToast('Caméra indisponible — utilisez la saisie manuelle', 'warn');
        openManualEntryModal(null);
      });

    var btnClose  = document.getElementById('btn-scan-close');
    var btnManual = document.getElementById('btn-scan-manual');
    var btnTorch  = document.getElementById('btn-scan-torch');
    if (btnClose)  btnClose.onclick  = function() { _closeVideoScan(); };
    if (btnManual) btnManual.onclick = function() { _closeVideoScan(); openManualEntryModal(null); };
    if (btnTorch)  btnTorch.onclick  = function() {
      if (!_scanTrack) { showToast('Track non disponible', 'warn'); return; }
      _torchOn = !_torchOn;
      _scanTrack.applyConstraints({ advanced: [{ torch: _torchOn }] })
        .catch(function() { showToast('Flash non disponible', 'warn'); _torchOn = false; });
      btnTorch.style.color = _torchOn ? '#FFD700' : '#fff';
      btnTorch.style.borderColor = _torchOn ? '#FFD700' : 'rgba(255,255,255,.3)';
    };
  }

  /* ── Arrêter le stream et fermer la modale ── */
  function _closeVideoScan() {
    if (_rafHandle) { cancelAnimationFrame(_rafHandle); _rafHandle = null; }
    _detectBusy = false;
    _scanCanvas = null;
    _scanCtx    = null;
    _scanTrack  = null;
    _torchOn    = false;
    if (_videoStream) {
      _videoStream.getTracks().forEach(function(t) { t.stop(); });
      _videoStream = null;
    }
    var modal = document.getElementById('modal-video-scan');
    var video = document.getElementById('scan-video');
    if (video) video.srcObject = null;
    if (modal) modal.classList.remove('open');
  }

  /* ── Boucle RAF — analyse chaque frame à 60fps ── */
  function _startRAFLoop() {
    var detector = _getNativeDetector();
    var video    = document.getElementById('scan-video');
    if (!detector || !video) {
      _closeVideoScan();
      showToast('Détecteur indisponible — utilisez la saisie manuelle', 'warn');
      openManualEntryModal(null);
      return;
    }

    function _loop() {
      if (!_videoStream) return;
      _rafHandle = requestAnimationFrame(_loop);
      if (_detectBusy || !_scanCanvas || video.readyState < 2) return;
      var _now = Date.now();
      if (_now - _lastDetect < 66) return; /* 15fps */
      _lastDetect = _now;
      _detectBusy = true;

      _scanCtx.drawImage(video, 0, 0);

      detector.detect(_scanCanvas)
        .then(function(barcodes) {
          _detectBusy = false;
          if (!barcodes || barcodes.length === 0) return;
          playBeep();
          _closeVideoScan();
          _onBarcodeDetected(barcodes[0].rawValue);
        })
        .catch(function() { _detectBusy = false; });
    }

    _loop();
  }

  function _setVideoStatus(msg) {
    var el = document.getElementById('scan-video-status');
    if (el) el.textContent = msg;
  }


  /* ── Point d'entrée scan ── */
  /* Point d'entrée scan vidéo */
  function _triggerNativeCapture() {
    _openVideoScan();
  }






  /* ── Arrêt caméra ── */
  function stopScan() {
    _closeVideoScan();
  }



  /* ── Code détecté ── */
  function _onBarcodeDetected(raw) {
    stopScan();
    var gs1 = parseGS1(raw);
    _pendingScan = gs1;

    /* Chercher le produit dans le cache local */
    var cachedProduct = gs1.gtin ? storeGetProductByGtin(gs1.gtin) : null;

    if (cachedProduct) {
      openQtyModal(cachedProduct, gs1);
    } else if (gs1.gtin) {
      /* Lookup en ligne */
      _setVideoStatus('Recherche produit…');
      lookupProduct(gs1.gtin)
        .then(function(product) {
          _setVideoStatus('');
          if (product) {
            storeUpsertProduct(product);
            fsScheduleSave();
            openQtyModal(product, gs1);
          } else {
            openUnknownProductModal(gs1);
          }
        })
        .catch(function() {
          _setVideoStatus('');
          openUnknownProductModal(gs1);
        });
    } else {
      /* Code non GS1 ou GTIN non extrait */
      openUnknownProductModal(gs1);
    }
  }

  /* Lookup produit : giygas.dev (1 appel CIP13/CIP7) puis GUDID en fallback DM.
     Cache local products[] géré en amont dans _onBarcodeDetected. */
  function lookupProduct(gtin) {
    return lookupBDPM(gtin).then(function(p) {
      if (p) return p;
      return lookupGUDID(gtin);
    });
  }

  /* GUDID (FDA) — fallback DM non trouvés dans BDPM. CORS permissif en HTTPS. */
  function lookupGUDID(gtin) {
    var url  = GUDID_API_BASE + encodeURIComponent(gtin);
    var ctrl = AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined;
    return fetch(url, { signal: ctrl })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !data.gudidResponse || !data.gudidResponse.device) return null;
        var d    = data.gudidResponse.device;
        var name = d.brandName || d.deviceDescription || 'Dispositif medical';
        return {
          id:          genId(),
          gtin:        gtin,
          name:        name,
          category:    'device',
          unit:        'unite',
          alertQtyMin: 0,
          _updatedAt:  Date.now()
        };
      })
      .catch(function() { return null; });
  }

  /* ── Lookup BDPM via bdpmgf.vedielaute.fr (source officielle gouv.fr)
     Étape 1 : /presentations?q=CIP13 → { cis, libelle }
     Étape 2 : /specialites/{cis}     → { denomination, forme_pharma, presentations[] }
     Avantage vs giygas.dev : couvre tous les CIP13 y compris hospitaliers/logistiques
  */
  /* Lookup médicament via medicaments-api.giygas.dev
     1 appel : GET /v1/medicaments?cip={cip13}
     Fallback : CIP7 = cip13.slice(4,11) */
  function lookupBDPM(gtin) {
    var cip13 = gtin.length === 14 ? gtin.slice(1) : gtin;
    var cip7  = cip13.length === 13 ? cip13.slice(4, 11) : null;

    function fetchByCip(cip) {
      var url  = GIYGAS_API_BASE + '?cip=' + encodeURIComponent(cip);
      var ctrl = AbortSignal.timeout ? AbortSignal.timeout(6000) : undefined;
      return fetch(url, { signal: ctrl })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          /* Réponse giygas v1 : objet unique (pas tableau) */
          var item = Array.isArray(data) ? data[0] : data;
          if (!item) return null;

          /* Nom : elementPharmaceutique contient déjà la forme */
          var name = item.elementPharmaceutique || item.denomination || item.nom || null;
          if (!name) return null;

          /* pkgQty depuis presentation[0].libelle */
          var pkgQty  = 0;
          var libelle = '';
          if (item.presentation && item.presentation.length > 0) {
            libelle = item.presentation[0].libelle || '';
          } else if (item.presentations && item.presentations.length > 0) {
            libelle = item.presentations[0].libelle || '';
          }
          if (libelle) {
            var mStart = libelle.match(/^(\d+)\s/);
            var mDe    = libelle.match(/\bde\s+(\d+)\b/i);
            if (mStart) pkgQty = parseInt(mStart[1], 10);
            else if (mDe) pkgQty = parseInt(mDe[1], 10);
          }

          return {
            id:          genId(),
            gtin:        gtin,
            name:        name,
            category:    'drug',
            unit:        mapFormeToUnit(item.formePharmaceutique || ''),
            pkgQty:      pkgQty || 0,
            alertQtyMin: 0,
            _updatedAt:  Date.now()
          };
        })
        .catch(function() { return null; });
    }

    return fetchByCip(cip13).then(function(p) {
      if (p) return p;
      return cip7 ? fetchByCip(cip7) : null;
    });
  }

  /* ── Popup quantité post-scan ── */
  function openQtyModal(product, gs1) {
    var sectorId = getCurrentSectorId();
    var sector = storeGetSectorById(sectorId);
    var unit = product.unit || 'unité';
    var isBoxMode = sector && sector.mode === 'box';
    var pkgQty    = product.pkgQty || 0;
    var qtyLabel  = isBoxMode
      ? (pkgQty > 0 ? 'Boîte de ' + pkgQty + ' ' + escH(unit) + '(s)' : 'Boîte')
      : 'Quantité (' + escH(unit) + ')';
    var qtyHint   = (isBoxMode && pkgQty > 0)
      ? '<div class="form-hint" style="text-align:center">1 boîte = ' + pkgQty + ' ' + escH(unit) + '(s)</div>'
      : '';

    var bodyHtml =
      '<div style="text-align:center;margin-bottom:16px">'
      + '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + escH(product.name) + '</div>'
      + '<div style="font-size:11px;color:var(--text2)">'
      + (gs1.lot ? 'Lot ' + escH(gs1.lot) : '')
      + (gs1.lot && gs1.expiry ? ' — ' : '')
      + (gs1.expiry ? 'Exp. ' + escH(displayDate(gs1.expiry)) : '')
      + '</div>'
      + '</div>'
      + '<div class="form-group" style="max-width:160px;margin:0 auto">'
      + '<label style="text-align:center">' + qtyLabel + '</label>'
      + '<input type="number" id="modal-qty-value" inputmode="numeric" value="1" min="1" style="text-align:center;font-size:22px;font-weight:700">'
      + qtyHint
      + '</div>';

    /* Pour OUT : afficher le type déjà choisi (délivrance/destruction) */
    if (_scanContext === 'out' && _scanSubtype) {
      var subtypeLabel = _scanSubtype === 'destruction' ? '🗑 Destruction' : '💊 Délivrance';
      bodyHtml += '<div style="font-size:11px;color:var(--text2);margin-top:8px">'
        + 'Type : <strong>' + subtypeLabel + '</strong></div>';
    }

    /* Pour TRANSFER : destination + emplacement si secteur dest a des locations */
    if (_scanContext === 'transfer' && _scanTarget) {
      var destSector = storeGetSectorById(_scanTarget);
      var destLabel  = destSector ? destSector.name : _scanTarget;
      var modeLabel  = _scanSubtype === 'partial' ? ' — unités' : '';
      bodyHtml += '<div style="font-size:11px;color:var(--text2);margin-top:8px">'
        + 'Vers : <strong>' + escH(destLabel) + '</strong>' + escH(modeLabel) + '</div>';
      /* Sélecteur emplacement destination si le secteur en a */
      if (destSector) {
        var destLocs = destSector.locations || [];
        if (destLocs.length > 0) {
          var destLocOpts = '<option value="">— Sans emplacement —</option>';
          destLocs.forEach(function(loc) {
            var subs = loc.sublocs || [];
            if (subs.length > 0) {
              subs.forEach(function(sub) {
                destLocOpts += '<option value="' + escH(loc.id) + '/' + escH(sub.id) + '">'
                  + escH(loc.name) + ' › ' + escH(sub.name) + '</option>';
              });
            }
            destLocOpts += '<option value="' + escH(loc.id) + '/">' + escH(loc.name) + '</option>';
          });
          bodyHtml += '<div class="form-group" style="margin-top:8px">'
            + '<label>Emplacement destination</label>'
            + '<select id="modal-qty-dest-location">' + destLocOpts + '</select>'
            + '</div>';
        }
      }
    }

    /* ADD : sélecteur emplacement si le secteur en a */
    if (_scanContext === 'add' && sector) {
      var locs = sector.locations || [];
      if (locs.length > 0) {
        var locOpts = '<option value="">— Sans emplacement —</option>';
        locs.forEach(function(loc) {
          var subs = loc.sublocs || [];
          if (subs.length > 0) {
            subs.forEach(function(sub) {
              locOpts += '<option value="' + escH(loc.id) + '/' + escH(sub.id) + '">'
                + escH(loc.name) + ' › ' + escH(sub.name) + '</option>';
            });
          }
          locOpts += '<option value="' + escH(loc.id) + '/">'
            + escH(loc.name) + ' (sans étagère)</option>';
        });
        bodyHtml += '<div class="form-group" style="margin-top:10px">'
          + '<label>Emplacement</label>'
          + '<select id="modal-qty-location">' + locOpts + '</select>'
          + '</div>';
      }
    }

    var actionLabel = _scanContext === 'add' ? 'Ajouter au stock'
      : _scanContext === 'transfer' ? 'Transférer'
      : 'Sortir du stock';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-qty">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-confirm-qty">' + actionLabel + '</button>';

    var modal = createModal('modal-qty', actionLabel, bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    /* Focus + sélection automatique de la valeur */
    setTimeout(function() {
      var inp = document.getElementById('modal-qty-value');
      if (inp) { inp.focus(); inp.select(); }
    }, 60);

    modal.addEventListener('click', function(e) {
      if (e.target.id === 'btn-confirm-qty') {
        _confirmQty(product, gs1);
      }
    });
  }

  /* ── Confirmer la quantité et créer le mouvement ── */
  function _confirmQty(product, gs1) {
    var qtyInput = document.getElementById('modal-qty-value');
    var qty = qtyInput ? Math.max(1, parseInt(qtyInput.value, 10) || 1) : 1;

    /* Subtype déjà défini avant le scan via openActionModal */
    var subtype = _scanSubtype;

    var targetSectorId = _scanTarget;
    /* Emplacement destination (transfert) */
    var destLocInput = document.getElementById('modal-qty-dest-location');
    var destLocRaw   = destLocInput ? destLocInput.value : '';
    var destLocParts = destLocRaw ? destLocRaw.split('/') : [];
    var destLocation = destLocParts[0] ? { locId: destLocParts[0], sublocId: destLocParts[1] || '' } : null;
    if (destLocation) params = Object.assign({}, params, { destLocation: destLocation });

    /* Emplacement choisi (ADD uniquement) */
    var locInput  = document.getElementById('modal-qty-location');
    var locRaw    = locInput ? locInput.value : '';
    var locParts  = locRaw ? locRaw.split('/') : [];
    var locationObj = locParts[0] ? { locId: locParts[0], sublocId: locParts[1] || '' } : null;

    closeModal('modal-qty');

    applyMovement({
      context:        _scanContext,
      subtype:        subtype,
      outMode:        _scanOutMode,
      sectorId:       getCurrentSectorId(),
      targetSectorId: targetSectorId,
      product:        product,
      gs1:            gs1,
      qty:            qty,
      location:       locationObj
    });

    /* Relance selon le mode */
    var isMaster = window.deployGetMode && window.deployGetMode() === 'master';
    if (_autoRescan || _scanMulti) {
      setTimeout(function() {
        if (isMaster) {
          openManualEntryModal(null);
        } else {
          _triggerNativeCapture();
        }
      }, 200);
    }
  }

  /* ── Popup produit inconnu ── */
  function openUnknownProductModal(gs1) {
    var bodyHtml =
      '<div style="font-size:12px;color:var(--text2);margin-bottom:14px">'
      + 'Produit non reconnu' + (gs1.gtin ? ' (GTIN : <span style="font-family:monospace">' + escH(gs1.gtin) + '</span>)' : '') + '.<br>'
      + 'Renseignez les informations pour créer la fiche produit.'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Nom du produit *</label>'
      + '<input type="text" id="modal-unknown-name" placeholder="Ex : Doliprane 500mg" autocomplete="off">'
      + '</div>'
      + '<div class="form-row">'
      + '<div class="form-group">'
      + '<label>Catégorie</label>'
      + '<select id="modal-unknown-category">'
      + '<option value="drug">Médicament</option>'
      + '<option value="device">Dispositif médical</option>'
      + '</select>'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Unité</label>'
      + '<select id="modal-unknown-unit">' + buildUnitOptions('boite') + '</select>'
      + '</div>'
      + '</div>'

      + '<div class="form-row">'
      + '<div class="form-group">'

      + '<input type="text" id="modal-unknown-lot" value="' + escH(gs1.lot || '') + '">'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Péremption</label>'
      + '<input type="text" id="modal-unknown-expiry" placeholder="JJ/MM/AAAA" inputmode="numeric" value="' + escH(gs1.expiry || '') + '" autocomplete="off">'
      + '<div class="form-hint">Formats acceptés : JJ/MM/AAAA ou MM/AAAA</div>'
      + '</div>'
      + '</div>'
      + '<div class="form-group">'
      + '<label>Alerte stock bas (qté min)</label>'
      + '<input type="number" id="modal-unknown-alert-qty" inputmode="numeric" value="0" min="0">'
      + '<div class="form-hint">Alerte affichée si la quantité tombe sous ce seuil. 0 = désactivé.</div>'
      + '</div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-unknown-product">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-create-product">Créer et continuer</button>';

    var modal = createModal('modal-unknown-product', '❓ Produit inconnu', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    setTimeout(function() {
      var inp = document.getElementById('modal-unknown-name');
      if (inp) inp.focus();
    }, 60);

    modal.addEventListener('click', function(e) {
      if (e.target.id === 'btn-create-product') {
        _createUnknownProduct(gs1);
      }
    });
  }

  function _createUnknownProduct(gs1) {
    var nameInput     = document.getElementById('modal-unknown-name');
    var catInput      = document.getElementById('modal-unknown-category');
    var unitInput     = document.getElementById('modal-unknown-unit');
    var lotInput      = document.getElementById('modal-unknown-lot');
    var expInput      = document.getElementById('modal-unknown-expiry');
    var alertQtyInput = document.getElementById('modal-unknown-alert-qty');

    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) { showToast('Le nom est requis', 'danger'); return; }

    /* Mettre à jour gs1 avec les valeurs saisies manuellement */
    if (lotInput && lotInput.value)   gs1.lot    = lotInput.value.trim();
    if (expInput && expInput.value)   gs1.expiry = expInput.value;

    var product = {
      id:          genId(),
      gtin:        gs1.gtin || null,
      name:        name,
      category:    catInput      ? catInput.value                             : 'drug',
      unit:        unitInput     ? unitInput.value || 'unite' : 'unite',
      pkgQty:      0,
      alertQtyMin:     alertQtyInput ? Math.max(0, parseInt(alertQtyInput.value, 10) || 0) : 0,
      alertQtyOptimal: 0,
      _updatedAt:  Date.now()
    };

    storeUpsertProduct(product);
    fsScheduleSave();
    closeModal('modal-unknown-product');
    openQtyModal(product, gs1);
  }

  /* ── Modale saisie manuelle complète ──
     Utilisée quand BarcodeDetector n'est pas dispo, ou bouton "Saisie manuelle"   */
  /* Saisie manuelle.
     - ADD      : select de tous les produits connus + option "Nouveau produit"
     - OUT/TRANSFER : select filtré sur les produits en stock dans le secteur courant
       (pas de création possible — on ne peut sortir que ce qui existe) */
  function openManualEntryModal(prefillGS1) {
    var gs1      = prefillGS1 || { gtin: null, lot: null, expiry: null, serial: null, raw: null };
    var context  = _scanContext || 'add';
    var sectorId = getCurrentSectorId();

    /* Construire la liste de produits selon le contexte */
    var productList;
    if (context === 'add') {
      productList = storeGetProducts().slice().sort(function(a, b) {
        return (a.name || '').localeCompare(b.name || '');
      });
    } else {
      /* Sortie / Transfert : uniquement les produits en stock ici */
      var stockEntries = storeGetStockBySector(sectorId).filter(function(e) {
        return !e._deletedAt && e.qty > 0;
      });
      var seenIds = {};
      productList = [];
      stockEntries.forEach(function(e) {
        if (!seenIds[e.productId]) {
          seenIds[e.productId] = true;
          var p = storeGetProductById(e.productId);
          if (p) productList.push(p);
        }
      });
      productList.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    }

    /* Options du select */
    var productOpts = '<option value="">— Sélectionner un produit —</option>';
    productList.forEach(function(p) {
      productOpts += '<option value="' + escH(p.id) + '">' + escH(p.name) + '</option>';
    });
    if (context === 'add') {
      productOpts += '<option value="__new__">＋ Nouveau produit…</option>';
    }

    var bodyHtml =
      '<div class="form-group">'      + '<label>Produit</label>'      + '<select id="manual-product-select">' + productOpts + '</select>'      + (context !== 'add' && productList.length === 0
          ? '<div class="form-hint" style="color:var(--danger)">Aucun produit en stock dans ce secteur.</div>'
          : '')       + '</div>'      + '<div class="form-group">'      + '<label>Code datamatrix brut (optionnel)</label>'      + '<input type="text" id="manual-raw-code" placeholder="Coller le code ici…" value="' + escH(gs1.raw || '') + '" autocomplete="off">'      + '<div class="form-hint">Parsé automatiquement si format GS1.</div>'      + '</div>'      + '<div class="form-row">'      + '<div class="form-group">'      + '<label>Lot</label>'      + '<input type="text" id="manual-lot" value="' + escH(gs1.lot || '') + '">'      + '</div>'      + '<div class="form-group">'      + '<label>Péremption</label>'      + '<input type="text" id="manual-expiry" placeholder="JJ/MM/AAAA" inputmode="numeric" value="' + escH(gs1.expiry || '') + '" autocomplete="off">'      + '</div>'      + '</div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-manual-entry">Annuler</button>'      + '<button class="btn btn-primary" id="btn-manual-confirm">Continuer</button>';

    var modal = createModal('modal-manual-entry', '⌨️ Saisie manuelle', bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    modal.addEventListener('click', function(e) {
      if (e.target.id === 'btn-manual-confirm') _processManualEntry(context, productList);
    });

    /* Focus sur le champ GS1 — douchette prête immédiatement */
    setTimeout(function() {
      var raw = document.getElementById('manual-raw-code');
      if (raw) {
        raw.focus();
        /* Enter dans le champ GS1 → soumet directement */
        raw.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            _processManualEntry(context, productList);
          }
        });
      }
    }, 80);
  }

  function _processManualEntry(context, productList) {
    var selectEl = document.getElementById('manual-product-select');
    var rawInput = document.getElementById('manual-raw-code');
    var lotInput = document.getElementById('manual-lot');
    var expInput = document.getElementById('manual-expiry');

    var selectedId = selectEl ? selectEl.value : '';
    var raw    = rawInput ? rawInput.value.trim() : '';
    var lot    = lotInput ? lotInput.value.trim() : '';
    var expiry = expInput ? parseManualDate(expInput.value) : '';

    /* Parser le code brut si fourni */
    var gs1 = raw ? parseGS1(raw) : { gtin: null, lot: null, expiry: null, serial: null, raw: '' };
    if (lot)    gs1.lot    = lot;
    if (expiry) gs1.expiry = expiry;

    closeModal('modal-manual-entry');

    /* Nouveau produit (add uniquement) */
    if (selectedId === '__new__') {
      openUnknownProductModal(gs1);
      return;
    }

    /* Produit sélectionné dans la liste */
    if (selectedId) {
      var product = storeGetProductById(selectedId);
      if (product) {
        /* Si code brut parsé, enrichir le GTIN du produit si manquant */
        if (gs1.gtin && !product.gtin) {
          product.gtin = gs1.gtin;
          product._updatedAt = Date.now();
          storeUpsertProduct(product);
          fsScheduleSave();
        }
        openQtyModal(product, gs1);
        return;
      }
    }

    /* Rien sélectionné */
    if (context === 'add') {
      /* ADD : si GTIN dans le code brut, tenter lookup API */
      if (gs1.gtin) {
        lookupProduct(gs1.gtin).then(function(p) {
          if (p) { storeUpsertProduct(p); fsScheduleSave(); openQtyModal(p, gs1); }
          else     openUnknownProductModal(gs1);
        }).catch(function() { openUnknownProductModal(gs1); });
      } else {
        openUnknownProductModal(gs1);
      }
    } else {
      /* OUT / TRANSFER : impossible de créer */
      showToast('Sélectionnez un produit dans la liste', 'warn');
    }
  }

  /* ── Expose ── */
  window.startScan            = startScan;
  window.stopScan             = stopScan;
  window.openManualEntryModal = openManualEntryModal;
  window.openUnknownProductModal = openUnknownProductModal;

  /* ── Modale de lancement d'une action (add / transfer / out) ──
     Regroupe avant le scan :
       - Coche "mouvements multiples"
       - Pour OUT  : choix délivrance / destruction
       - Pour TRANSFER : choix du secteur destination
  */
  function openActionModal(context) {
    _scanContext = context;
    _scanSubtype = null;
    _scanTarget  = null;
    _scanMulti   = false;

    var titles = { add: '+ Ajouter au stock', transfer: 'Transférer', out: 'Sortir du stock' };
    var title  = titles[context] || 'Scanner';
    var bodyHtml = '';

    /* OUT : choix délivrance / destruction */
    var srcSectorOut = storeGetSectorById(getCurrentSectorId());
    var isBoxOut = srcSectorOut && srcSectorOut.mode === 'box';
    if (context === 'out') {
      bodyHtml +=
        '<div class="form-group">'
        + '<label>Type de sortie</label>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
        + '<button class="btn btn-warning" id="btn-subtype-delivery"  style="padding:14px;font-size:13px">💊 Délivrance</button>'
        + '<button class="btn btn-ghost"   id="btn-subtype-destruction" style="padding:14px;font-size:13px">🗑 Destruction</button>'
        + '</div></div>';
      /* En mode boîte, proposer délivrance en boîtes ou en unités */
      if (isBoxOut) {
        bodyHtml += '<div class="form-group" id="delivery-mode-block" style="display:none">'
          + '<label>Mode de délivrance</label>'
          + '<select id="modal-delivery-mode">'
          + '<option value="box">Boîtes entières</option>'
          + '<option value="partial">Unités (boîte sécable)</option>'
          + '</select></div>';
      }
    }

    /* TRANSFER : secteur destination + mode si source en boîte */
    if (context === 'transfer') {
      var sectorId  = getCurrentSectorId();
      var srcSector = storeGetSectorById(sectorId);
      var others    = storeGetSectors().filter(function(s) {
        return s.id !== sectorId && s.id !== 'global';
      });
      if (others.length === 0) {
        showToast('Aucun autre secteur disponible pour le transfert', 'warn');
        return;
      }
      var opts = others.map(function(s) {
        return '<option value="' + escH(s.id) + '">' + escH(s.name) + '</option>';
      }).join('');
      bodyHtml += '<div class="form-group"><label>Secteur destination</label>'
        + '<select id="modal-action-target">' + opts + '</select></div>';

      /* Si source en mode boîte : proposer boîtes ou unités */
      if (srcSector && srcSector.mode === 'box') {
        bodyHtml += '<div class="form-group"><label>Mode de transfert</label>'
          + '<select id="modal-transfer-mode">'
          + '<option value="box">Boîtes entières</option>'
          + '<option value="partial">Unités (boîte sécable)</option>'
          + '</select></div>';
      }
    }

    /* Coche mouvements multiples */
    bodyHtml +=
      '<div style="display:flex;align-items:center;gap:10px;margin-top:12px;padding:12px;background:var(--surface2);border-radius:8px">'
      + '<input type="checkbox" id="modal-action-multi" style="width:18px;height:18px;cursor:pointer;flex-shrink:0">'
      + '<label for="modal-action-multi" style="font-size:13px;cursor:pointer;margin:0;line-height:1.3">'
      + 'Mouvements multiples<br><span style="font-size:11px;color:var(--text3)">Relance le scan après chaque confirmation</span>'
      + '</label></div>';

    var footerHtml =
      '<button class="btn btn-secondary" data-close-modal="modal-action">Annuler</button>'
      + '<button class="btn btn-primary" id="btn-action-launch"'
      + (context === 'out' ? ' disabled style="opacity:.4"' : '')
      + '>Scanner</button>';

    var modal = createModal('modal-action', title, bodyHtml, footerHtml, 'sm');
    if (!modal) return;

    if (context === 'out') {
      modal.addEventListener('click', function(e) {
        var btnD = document.getElementById('btn-subtype-delivery');
        var btnX = document.getElementById('btn-subtype-destruction');
        var btnL = document.getElementById('btn-action-launch');
        if (e.target.id === 'btn-subtype-delivery') {
          _scanSubtype = 'delivery';
          if (btnD) { btnD.classList.add('btn-warning');    btnD.classList.remove('btn-ghost');   }
          if (btnX) { btnX.classList.remove('btn-danger');  btnX.classList.add('btn-ghost');      }
          if (btnL) { btnL.removeAttribute('disabled');     btnL.style.opacity = '1'; }
          var dmBlock = document.getElementById('delivery-mode-block');
          if (dmBlock) dmBlock.style.display = '';
        }
        if (e.target.id === 'btn-subtype-destruction') {
          _scanSubtype = 'destruction';
          if (btnX) { btnX.classList.add('btn-danger');     btnX.classList.remove('btn-ghost');   }
          if (btnD) { btnD.classList.remove('btn-warning'); btnD.classList.add('btn-ghost');      }
          if (btnL) { btnL.removeAttribute('disabled');     btnL.style.opacity = '1'; }
          var dmBlock2 = document.getElementById('delivery-mode-block');
          if (dmBlock2) dmBlock2.style.display = 'none';
        }
        if (e.target.id === 'btn-action-launch') _launchFromActionModal();
      });
    } else {
      modal.addEventListener('click', function(e) {
        if (e.target.id === 'btn-action-launch') _launchFromActionModal();
      });
    }
  }

  function _launchFromActionModal() {
    var multiCheck    = document.getElementById('modal-action-multi');
    var targetInput   = document.getElementById('modal-action-target');
    var transferMode  = document.getElementById('modal-transfer-mode');
    var delivMode     = document.getElementById('modal-delivery-mode');
    _scanMulti   = !!(multiCheck && multiCheck.checked);
    _scanTarget  = targetInput  ? targetInput.value  : null;
    /* Transfer : stocker le mode (box/partial) dans _scanSubtype */
    if (transferMode) _scanSubtype = transferMode.value;
    /* Delivery : stocker le mode de délivrance pour _applyOut */
    _outMode = delivMode ? delivMode.value : null;
    closeModal('modal-action');
    startScan(_scanContext, _scanSubtype, _scanTarget);
  }

  window.openActionModal = openActionModal;

}());


/* =====================================================================
   6c. MOVEMENT MODULE
   Applique les mouvements de stock (entrée, sortie, transfert).
   Écrit dans store.stock et store.movements.
   ===================================================================== */
(function() {
  'use strict';

  /* ── Constantes de type de mouvement ── */
  var MOVEMENT_IN       = 'in';
  var MOVEMENT_OUT      = 'out';
  var MOVEMENT_TRANSFER = 'transfer';

  /* ── Appliquer un mouvement complet ──
     params : { context, subtype, sectorId, targetSectorId, product, gs1, qty }
  */
  function applyMovement(params) {
    var context        = params.context;
    var subtype        = params.subtype        || null;
    var outMode        = params.outMode        || 'box';
    var sectorId       = params.sectorId;
    var targetSectorId = params.targetSectorId || null;
    var product        = params.product;
    var gs1            = params.gs1            || {};
    var qty            = params.qty            || 1;
    var location       = params.location       || null;
    /* outMode transmis de _launchFromActionModal → _confirmQty → ici */
    if (params.outMode !== undefined) params.outMode = params.outMode;

    if (!product || !sectorId) {
      showToast('Erreur : produit ou secteur manquant', 'danger');
      return;
    }

    var ok = false;
    try {
      if (context === 'add') {
        _applyIn(sectorId, product, gs1, qty, location);
        ok = true;
      } else if (context === 'out') {
        var _outRes = _applyOut(sectorId, product, gs1, qty, subtype, { outMode: outMode });
        if (_outRes === 'pending') return; /* modale FEFO a pris le relais */
        ok = _outRes;
      } else if (context === 'transfer') {
        if (!targetSectorId) { showToast('Secteur destination manquant', 'danger'); return; }
        ok = _applyTransfer(sectorId, targetSectorId, product, gs1, qty, params);
      }
    } catch(e) {
      window.dbg('[applyMovement] ' + e.message, 'error');
      showToast('Erreur lors du mouvement', 'danger');
    }

    if (ok) fsScheduleSave();
    /* Toujours rafraîchir l'affichage, succès ou échec */
    window.renderSectorNav();
    window.renderSectorContent();
  }

  /* ── Entrée en stock ── */
  function _applyIn(sectorId, product, gs1, qty, location) {
    var sector = storeGetSectorById(sectorId);
    if (!sector) return;

    /* Mode unité : consolider si même lot + expiry + emplacement */
    /* Mode boîte : toujours nouvelle entrée */
    var existingEntry = (sector.mode === 'unit')
      ? _findStockEntry(sectorId, product.id, gs1.lot, gs1.expiry, location)
      : null;

    if (existingEntry) {
      existingEntry.qty += qty;
      storeUpsertStockEntry(existingEntry);
    } else {
      var newEntry = {
        id:         genId(),
        sectorId:   sectorId,
        productId:  product.id,
        lot:        gs1.lot    || '',
        expiry:     gs1.expiry || '',
        qty:        qty,
        location:   location   || '',
        _updatedAt: Date.now(),
        _deletedAt: null
      };
      storeUpsertStockEntry(newEntry);
    }

    storeAddMovement({
      type:           MOVEMENT_IN,
      subtype:        null,
      sectorId:       sectorId,
      targetSectorId: null,

    showToast('＋ ' + qty + ' ' + pluralUnit(product.unit || 'unite', qty) + ' ajouté' + (qty > 1 ? 's' : '') + ' — ' + product.name, 'success');
  }

  /* ── Sortie de stock ── */
  /* ── Sortie de stock ── */
  function _applyOut(sectorId, product, gs1, qty, subtype, params) {
    var sector = storeGetSectorById(sectorId);
    if (!sector) throw new Error('Secteur introuvable');
    var isBox  = sector.mode === 'box';
    var pkgQty = product.pkgQty || 0;

    /* Délivrance partielle (unités depuis boîte) */
    if (isBox && subtype === 'delivery' && params && params.outMode === 'partial') {
      return _applyOutPartial(sectorId, product, gs1, qty);
    }

    /* Destruction : toujours à la boîte (entière ou entamée) */
    if (subtype === 'destruction') {
      var entries = storeGetStockBySector(sectorId).filter(function(e) {
        return e.productId === product.id && e.qty > 0 &&
               (!gs1.lot || (e.lot || '') === (gs1.lot || ''));
      });
      if (entries.length === 0) {
        showToast('Produit non trouvé en stock', 'danger');
        return false;
      }
      /* Détruire boîte par boîte selon qty demandée */
      var remaining = qty;
      entries.forEach(function(e) {
        if (remaining <= 0) return;
        /* Boîte entamée : détruire les unités restantes (pas pkgQty) */
        var destroyed = e.partial ? e.qty : Math.min(e.qty, remaining);
        remaining -= destroyed;
        e.qty -= destroyed;
        if (e.qty <= 0) {
          storeDeleteStockEntry(e.id);
        } else {
          storeUpsertStockEntry(e);
        }
        storeAddMovement({
          type: MOVEMENT_OUT, subtype: 'destruction',
          sectorId: sectorId, targetSectorId: null,
          productId: product.id, lot: e.lot, expiry: e.expiry,
          qty: destroyed, note: ''
        });
      });
      var unitLabel = isBox && pkgQty > 0 ? pluralUnit('boite', qty) : pluralUnit(product.unit || 'unite', qty);
      showToast('🗑 Destruction : ' + qty + ' ' + unitLabel + ' — ' + product.name, 'success');
      return true;
    }

    /* Délivrance normale (boîtes entières ou mode unité) */
    var entry = _findBestEntryForOut(sectorId, product.id, gs1.lot, gs1.expiry);
    if (!entry) {
      showToast('Produit non trouvé en stock dans ce secteur', 'danger');
      return false;
    }
    /* Alerte FEFO : lot scanné ≠ lot FEFO optimal → modale de choix */
    if (gs1.lot && entry.lot && gs1.lot !== entry.lot) {
      var _fefoStock = storeGetStockBySector(sectorId).filter(function(e) {
        return e.productId === product.id && e.qty > 0;
      }).sort(function(a, b) {
        if (!a.expiry && !b.expiry) return 0;
        if (!a.expiry) return 1;
        if (!b.expiry) return -1;
        return a.expiry < b.expiry ? -1 : 1;
      });
      var _fefoEntry = _fefoStock[0] || null;
      if (_fefoEntry && _fefoEntry.lot !== gs1.lot) {
        /* Interrompre la sortie et afficher la modale */
        _openFefoModal(product, gs1, qty, subtype, entry, _fefoEntry, sectorId);
        return 'pending'; /* sortie suspendue — la modale prend le relais */
      }
    }
    if (entry.qty < qty) {
      showToast('Quantité insuffisante en stock (' + entry.qty + ' disponible)', 'danger');
      return false;
    }

    entry.qty -= qty;
    if (entry.qty <= 0) {
      storeDeleteStockEntry(entry.id);
    } else {
      storeUpsertStockEntry(entry);
    }

    storeAddMovement({
      type: MOVEMENT_OUT, subtype: subtype || 'delivery',
      sectorId: sectorId, targetSectorId: null,
      productId: product.id, lot: entry.lot, expiry: entry.expiry,
      qty: qty, note: ''
    });

    showToast('− ' + qty + ' ' + pluralUnit(product.unit || 'unite', qty) + ' sorti' + (qty > 1 ? 's' : '') + ' — ' + product.name, 'success');
    return true;
  }

  /* Délivrance partielle en unités depuis une boîte (mode boîte) */
  function _applyOutPartial(sectorId, product, gs1, unitQty) {
    var pkgQty = product.pkgQty || 0;
    if (pkgQty <= 0) {
      showToast('Conditionnement inconnu — impossible de délivrer en unités', 'danger');
      return false;
    }
    var stock = storeGetStockBySector(sectorId).filter(function(e) {
      return e.productId === product.id && e.qty > 0 &&
             (!gs1.lot || (e.lot || '') === (gs1.lot || ''));
    });
    /* Priorité : boîte entamée */
    var fromEntry = null;
    var partials = stock.filter(function(e) { return e.partial && e.qty >= unitQty; });
    if (partials.length > 0) {
      fromEntry = partials[0];
    } else {
      var full = stock.filter(function(e) { return !e.partial && e.qty >= 1; });
      if (full.length > 0) fromEntry = full[0];
    }
    if (!fromEntry) { showToast('Stock insuffisant', 'danger'); return false; }

    var availableUnits = fromEntry.partial ? fromEntry.qty : fromEntry.qty * pkgQty;
    if (availableUnits < unitQty) {
      showToast('Quantité insuffisante (' + availableUnits + ' ' + pluralUnit(product.unit || 'unite', availableUnits) + ' disponibles)', 'danger');
      return false;
    }
    var remainingUnits = availableUnits - unitQty;
    if (remainingUnits <= 0) {
      storeDeleteStockEntry(fromEntry.id);
    } else if (fromEntry.partial) {
      fromEntry.qty = remainingUnits; fromEntry._updatedAt = Date.now();
      storeUpsertStockEntry(fromEntry);
    } else {
      if (fromEntry.qty > 1) {
        fromEntry.qty -= 1; fromEntry._updatedAt = Date.now();
        storeUpsertStockEntry(fromEntry);
        storeUpsertStockEntry({ id: genId(), sectorId: sectorId, productId: product.id,
          lot: fromEntry.lot, expiry: fromEntry.expiry, qty: remainingUnits,
          partial: true, location: fromEntry.location || '', _updatedAt: Date.now(), _deletedAt: null });
      } else {
        fromEntry.qty = remainingUnits; fromEntry.partial = true; fromEntry._updatedAt = Date.now();
        storeUpsertStockEntry(fromEntry);
      }
    }
    storeAddMovement({ type: MOVEMENT_OUT, subtype: 'delivery', sectorId: sectorId,
      targetSectorId: null, productId: product.id, lot: fromEntry.lot, expiry: fromEntry.expiry,
      qty: unitQty, note: 'Délivrance partielle boîte sécable' });
    showToast('💊 − ' + unitQty + ' ' + pluralUnit(product.unit || 'unite', unitQty) + ' délivrés — ' + product.name, 'success');
    return true;
  }

  /* ── Transfert entre secteurs ── */
  /* ── Transfert inter-secteurs ── */
  function _applyTransfer(fromSectorId, toSectorId, product, gs1, qty, params) {
    var fromSector = storeGetSectorById(fromSectorId);
    var toSector   = storeGetSectorById(toSectorId);

    /* Mode partiel explicitement demandé via le select avant scan */
    var transferSubtype = params ? (params.subtype || null) : null;
    if (transferSubtype === 'partial') {
      return _applyTransferPartial(fromSectorId, toSectorId, product, gs1, qty);
    }

    var fromEntry = _findBestEntryForOut(fromSectorId, product.id, gs1.lot, gs1.expiry);
    if (!fromEntry) {
      showToast('Produit non trouvé en stock dans ce secteur', 'danger');
      return false;
    }
    if (fromEntry.qty < qty) {
      showToast('Quantité insuffisante (' + fromEntry.qty + ' disponible)', 'danger');
      return false;
    }

    fromEntry.qty -= qty;
    if (fromEntry.qty <= 0) {
      storeDeleteStockEntry(fromEntry.id);
    } else {
      storeUpsertStockEntry(fromEntry);
    }

    var toEntry = _findStockEntry(toSectorId, product.id, fromEntry.lot, fromEntry.expiry);
    if (toEntry) {
      toEntry.qty += qty;
      storeUpsertStockEntry(toEntry);
    } else {
      storeUpsertStockEntry({
        id:         genId(),
        sectorId:   toSectorId,
        productId:  product.id,
        lot:        fromEntry.lot,
        expiry:     fromEntry.expiry,
        qty:        qty,
        partial:    false,
        location:   '',
        _updatedAt: Date.now(),
        _deletedAt: null
      });
    }

    storeAddMovement({
      type:           MOVEMENT_TRANSFER,
      subtype:        null,
      sectorId:       fromSectorId,
      targetSectorId: toSectorId,
      productId:      product.id,
      lot:            fromEntry.lot,
      expiry:         fromEntry.expiry,
      qty:            qty,
      note:           ''
    });

    var toSec = storeGetSectorById(toSectorId);
    showToast('Transfert : ' + qty + ' ' + pluralUnit(product.unit || 'unite', qty) + ' vers ' + (toSec ? toSec.name : toSectorId), 'success');
    return true;
  }


  /* Modale de choix FEFO :
     propose lot optimal (FEFO) ou lot scanné */
  function _openFefoModal(product, gs1, qty, subtype, scannedEntry, fefoEntry, sectorId) {
    var unit = product.unit || 'u';
    var bodyHtml =
      '<div style="font-size:12px;font-weight:600;margin-bottom:10px">' + escH(product.name) + '</div>'

      + '<button class="btn btn-primary" id="btn-fefo-optimal" style="text-align:left;padding:12px">'

      + (scannedEntry && scannedEntry.expiry ? ' — expire le ' + displayDate(scannedEntry.expiry) : '')
      + '</div>'

    var footerHtml = '<button class="btn btn-ghost" data-close-modal="modal-fefo">Annuler</button>';

    if (!modal) return;

    modal.addEventListener('click', function(e) {
      if (e.target.id === 'btn-fefo-optimal') {
        closeModal('modal-fefo');

        var fefoGs1 = Object.assign({}, gs1, { lot: fefoEntry.lot, expiry: fefoEntry.expiry });
        _applyOut(sectorId, product, fefoGs1, qty, subtype);

      }
      if (e.target.id === 'btn-fefo-scanned') {
        closeModal('modal-fefo');

    });

  /* Sortie directe sur une entrée spécifique (contourne _findBestEntryForOut) */
  function _applyOutDirect(sectorId, product, gs1, qty, subtype, entry) {
    if (!entry || entry.qty < qty) {
      showToast('Quantité insuffisante', 'danger'); return false;
    }
    entry.qty -= qty;
    if (entry.qty <= 0) {
      storeDeleteStockEntry(entry.id);
    } else {
      storeUpsertStockEntry(entry);
    }
    storeAddMovement({
      type: MOVEMENT_OUT, subtype: subtype || 'delivery',
      sectorId: sectorId, targetSectorId: null,
      productId: product.id, lot: entry.lot, expiry: entry.expiry,
      qty: qty, note: 'Lot non-FEFO confirmé'
    });
    var unit = product.unit || 'unité';
    showToast('− ' + qty + ' ' + pluralUnit(unit, qty) + ' sorti' + (qty > 1 ? 's' : '') + ' — ' + product.name, 'success');
    return true;
  }

  /* ── Trouver une entrée de stock (correspondance exacte lot+péremption) ── */
  /* Cherche une entrée de stock par productId+lot+expiry+location.
     location peut être null (ignoré) ou un objet {locId, sublocId} / '' */
  function _findStockEntry(sectorId, productId, lot, expiry, location) {
    var stock = storeGetStockBySector(sectorId);
    return stock.find(function(s) {
      if (s.productId !== productId) return false;
      if ((s.lot    || '') !== (lot    || '')) return false;
      if ((s.expiry || '') !== (expiry || '')) return false;
      /* Si location fournie : comparer */
      if (location !== undefined && location !== null) {
        var sLoc  = s.location  || '';
        var tLoc  = location    || '';
        var sKey  = typeof sLoc === 'object' ? (sLoc.locId + '/' + (sLoc.sublocId || '')) : sLoc;
        var tKey  = typeof tLoc === 'object' ? (tLoc.locId + '/' + (tLoc.sublocId || '')) : tLoc;
        if (sKey !== tKey) return false;
      }
      return true;
    }) || null;
  }

  /* ── Trouver la meilleure entrée pour une sortie ──
     Priorité : correspondance exacte lot+exp → puis lot seul → puis premier disponible
     (FEFO : First Expired First Out)                                               */
  function _findBestEntryForOut(sectorId, productId, lot, expiry) {
    var stock = storeGetStockBySector(sectorId).filter(function(s) {
      return s.productId === productId && s.qty > 0;
    });
    if (stock.length === 0) return null;

    /* Correspondance exacte */
    if (lot || expiry) {
      var exact = stock.find(function(s) {
        return (s.lot || '') === (lot || '') && (s.expiry || '') === (expiry || '');
      });
      if (exact) return exact;
    }

    /* FEFO : trier par date de péremption croissante, prendre le plus proche */
    var sorted = stock.slice().sort(function(a, b) {
      if (!a.expiry && !b.expiry) return 0;
      if (!a.expiry) return 1;
      if (!b.expiry) return -1;
      return a.expiry < b.expiry ? -1 : 1;
    });
    return sorted[0] || null;
  }


  /* ── Transfert partiel depuis une boîte (boîte sécable) ──
     Scénario : secteur source en mode 'box', on transfère N unités
     (pas N boîtes) vers un secteur en mode 'unit'.
     Résultat :
       - Source : boîte entamée qty = pkgQty - N (partial:true)
       - Destination : N unités ajoutées
  */
  /* Transfert partiel : N unités depuis une boîte (mode boîte → mode unité).
     entry.qty = nombre de BOÎTES en stock.
     unitQty   = nombre d'UNITÉS à transférer.
     Conversion : 1 boîte = pkgQty unités. */
  function _applyTransferPartial(fromSectorId, toSectorId, product, gs1, unitQty) {
    var pkgQty = product.pkgQty || 0;
    if (pkgQty <= 0) {
      showToast('Conditionnement inconnu (pkgQty=0) — impossible de sécabiliser', 'danger');
      return false;
    }


    /* Chercher les entrées du produit dans la source */
    var stock = storeGetStockBySector(fromSectorId).filter(function(e) {
      return e.productId === product.id && e.qty > 0 &&
             (!gs1.lot || (e.lot || '') === (gs1.lot || ''));
    });


    /* Convertir stock en unités disponibles pour trouver la bonne entrée.
       - Entrée partielle : qty = unités restantes
       - Entrée complète  : qty = boîtes × pkgQty = unités totales */
    var fromEntry = null;

    /* Priorité 1 : boîte déjà entamée avec assez d'unités */
    var partials = stock.filter(function(e) {
      return e.partial && e.qty >= unitQty;
    });
    if (partials.length > 0) {
      fromEntry = partials[0];
    }

    /* Priorité 2 : boîte complète (qty = nb boîtes, chaque boîte = pkgQty unités) */
    if (!fromEntry) {
      var full = stock.filter(function(e) {
        return !e.partial && e.qty >= 1; /* au moins 1 boîte */
      });
      if (full.length > 0) {
        fromEntry = full[0];
      }
    }

    if (!fromEntry) {
      showToast('Stock insuffisant pour ce transfert', 'danger');
      return false;
    }

    /* Vérifier qu'on a assez d'unités disponibles */
    var availableUnits = fromEntry.partial
      ? fromEntry.qty                    /* déjà en unités */
      : fromEntry.qty * pkgQty;          /* boîtes → unités */


    if (availableUnits < unitQty) {
      showToast('Quantité insuffisante (' + availableUnits + ' unités disponibles)', 'danger');
      return false;
    }

    /* Calculer ce qui reste dans la boîte source après transfert */
    var remainingUnits = availableUnits - unitQty;

    if (remainingUnits <= 0) {
      /* Boîte vidée complètement */
      storeDeleteStockEntry(fromEntry.id);
    } else if (fromEntry.partial) {
      /* Boîte déjà partielle : juste réduire le qty en unités */
      fromEntry.qty        = remainingUnits;
      fromEntry._updatedAt = Date.now();
      storeUpsertStockEntry(fromEntry);
    } else {
      /* Boîte complète entamée : transformer en entrée partielle en unités */
      /* Si plusieurs boîtes : réduire d'1 boîte + créer entrée partielle */
      if (fromEntry.qty > 1) {
        /* Déduire 1 boîte */
        fromEntry.qty       -= 1;
        fromEntry._updatedAt = Date.now();
        storeUpsertStockEntry(fromEntry);
        /* Créer l'entrée partielle avec les unités restantes */
        storeUpsertStockEntry({
          id:         genId(),
          sectorId:   fromSectorId,
          productId:  product.id,
          lot:        fromEntry.lot,
          expiry:     fromEntry.expiry,
          qty:        remainingUnits,
          partial:    true,
          location:   fromEntry.location || '',
          _updatedAt: Date.now(),
          _deletedAt: null
        });
      } else {
        /* 1 seule boîte → devient partielle */
        fromEntry.qty        = remainingUnits;
        fromEntry.partial    = true;
        fromEntry._updatedAt = Date.now();
        storeUpsertStockEntry(fromEntry);
      }
    }

    /* Ajouter les unités dans la destination */
    var toEntry = _findStockEntry(toSectorId, product.id, fromEntry.lot, fromEntry.expiry);
    if (toEntry) {
      toEntry.qty        += unitQty;
      toEntry._updatedAt  = Date.now();
      storeUpsertStockEntry(toEntry);
    } else {
      storeUpsertStockEntry({
        id:         genId(),
        sectorId:   toSectorId,
        productId:  product.id,
        lot:        fromEntry.lot,
        expiry:     fromEntry.expiry,
        qty:        unitQty,
        partial:    false,
        location:   '',
        _updatedAt: Date.now(),
        _deletedAt: null
      });
    }

    storeAddMovement({
      type:           MOVEMENT_TRANSFER,
      subtype:        'partial',
      sectorId:       fromSectorId,
      targetSectorId: toSectorId,
      productId:      product.id,
      lot:            fromEntry.lot,
      expiry:         fromEntry.expiry,
      qty:            unitQty,
      note:           'Transfert partiel boîte sécable'
    });

    var toSector = storeGetSectorById(toSectorId);
    var unit     = pluralUnit(product.unit || 'unite', unitQty);
    showToast('Transfert : ' + unitQty + ' ' + unit + ' vers ' + (toSector ? toSector.name : toSectorId), 'success');
    return true;
  }

  /* ── Popup transfert partiel ──
     Demande combien d'unités transférer depuis une boîte */


  /* ── Expose ── */
  window.applyMovement = applyMovement;

}());

  /* ── Onglet périmés (M+1 ou M+3) ── */
  function _renderExpiryTab(days, title) {
    var sectors   = storeGetSectors().filter(function(s) { return s.id !== 'global'; });
    var settings  = storeGetSettings();
    var cutoff    = new Date();
    cutoff.setDate(cutoff.getDate() + days);
    var now       = new Date();

    /* Collecter toutes les entrées à risque */
    var rows = [];
    sectors.forEach(function(sector) {
      var stock = storeGetStockBySector(sector.id);
      stock.forEach(function(entry) {
        if (!entry.expiry) return;
        var expDate = new Date(entry.expiry);
        if (expDate > cutoff) return;         /* au-delà du seuil : ignorer */
        var product = storeGetProductById(entry.productId);
        rows.push({
          sectorName:  sector.name,
          productName: product ? product.name : '(inconnu)',
          lot:         entry.lot || '-',
          expiry:      entry.expiry,
          expDate:     expDate,
          qty:         entry.qty,
          unit:        product ? (product.unit || 'unite') : 'unite',
          expired:     expDate < now
        });
      });
    });

    /* Trier : périmés d'abord, puis par date croissante */
    rows.sort(function(a, b) {
      if (a.expired && !b.expired) return -1;
      if (!a.expired && b.expired) return 1;
      return a.expDate - b.expDate;
    });

    var html = '<div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    html += '<span class="section-title" style="margin:0">' + title + '</span>';
    if (rows.length > 0) {
      html += '<button class="btn btn-ghost btn-sm" data-export-csv="expiry" style="font-size:10px">⬇ CSV</button>';
    }
    html += '</div>';

    if (rows.length === 0) {
      html += '<div class="empty-state" style="padding:32px 0">';
      html += '<div class="empty-state-icon">✅</div>';
      html += '<div class="empty-state-title">Aucune expiration dans cette période</div>';
      html += '</div>';
    } else {
      /* Tableau */
      html += '<div style="overflow-x:auto">';
      html += '<table style="width:100%;border-collapse:collapse;font-size:11px">';
      html += '<thead><tr style="border-bottom:2px solid var(--border)">';
      ['Secteur','Produit','Lot','Expiration','Qté'].forEach(function(h) {
        html += '<th style="text-align:left;padding:4px 6px;font-size:10px;color:var(--text2)">' + h + '</th>';
      });
      html += '</tr></thead><tbody>';

      rows.forEach(function(r) {
        var rowColor = r.expired ? 'background:var(--danger-bg,#fff0f0)' : '';
        var expColor = r.expired ? 'color:var(--danger);font-weight:600' : 'color:var(--warn)';
        html += '<tr style="border-bottom:1px solid var(--border);' + rowColor + '">';
        html += '<td style="padding:5px 6px">' + escH(r.sectorName) + '</td>';
        html += '<td style="padding:5px 6px;font-weight:500">' + escH(r.productName) + '</td>';
        html += '<td style="padding:5px 6px;font-family:monospace;font-size:10px">' + escH(r.lot) + '</td>';
        html += '<td style="padding:5px 6px;' + expColor + '">' + displayDate(r.expiry) + '</td>';
        html += '<td style="padding:5px 6px;font-weight:600">' + r.qty + ' ' + escH(r.unit) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';

      /* Compteur */
      var expired = rows.filter(function(r) { return r.expired; }).length;
      html += '<div style="font-size:10px;color:var(--text2);margin-top:8px">';
      html += rows.length + ' lot' + (rows.length > 1 ? 's' : '') + ' concerné' + (rows.length > 1 ? 's' : '');
      if (expired > 0) html += ' — <span style="color:var(--danger);font-weight:600">' + expired + ' déjà périmé' + (expired > 1 ? 's' : '') + '</span>';
      html += '</div>';

    /* Stocker les données pour export CSV */
    window._reportExpiryRows = rows;
    html += '</div>';
    return html;
  }

  /* ── Onglet stock global ── */
  function _renderStockTab() {
    var sectors  = storeGetSectors().filter(function(s) { return s.id !== 'global'; });
    var settings = storeGetSettings();
    var rows = [];

    sectors.forEach(function(sector) {
      var groups = groupStockByProduct(storeGetStockBySector(sector.id));
      groups.forEach(function(g) {
        var product = g.product;
        var worst   = 'ok';
        var nearestExpiry = null;
        g.entries.forEach(function(e) {
          var s = expiryStatus(e.expiry);
          if (s === 'danger') worst = 'danger';
          else if (s === 'warn' && worst !== 'danger') worst = 'warn';
          if (e.expiry && (!nearestExpiry || e.expiry < nearestExpiry)) nearestExpiry = e.expiry;
        });
        var isLow = product && product.alertQtyMin > 0 && g.totalQty <= product.alertQtyMin;
        rows.push({
          sectorName:    sector.name,
          productName:   product ? product.name : '(inconnu)',
          category:      product ? product.category : '-',
          lots:          g.entries.length,
          qty:           g.totalQty,
          unit:          product ? (product.unit || 'unite') : 'unite',
          nearestExpiry: nearestExpiry,
          alertQtyMin:   product ? (product.alertQtyMin || 0) : 0,
          isLow:         isLow,
          worst:         worst
        });
      });
    });

    /* Trier : alertes en tête, puis secteur, puis produit */
    rows.sort(function(a, b) {
      function sc(r) { return r.worst === 'danger' ? 3 : r.worst === 'warn' ? 2 : r.isLow ? 1 : 0; }
      var d = sc(b) - sc(a);
      if (d !== 0) return d;
      if (a.sectorName !== b.sectorName) return a.sectorName.localeCompare(b.sectorName);
      return a.productName.localeCompare(b.productName);
    });

    var html = '<div>';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    html += '<span class="section-title" style="margin:0">Stock consolidé — tous secteurs</span>';
    if (rows.length > 0) {
      html += '<button class="btn btn-ghost btn-sm" data-export-csv="stock" style="font-size:10px">⬇ CSV</button>';
    }
    html += '</div>';

    if (rows.length === 0) {
      html += '<div class="empty-state" style="padding:32px 0">';
      html += '<div class="empty-state-icon">📦</div>';
      html += '<div class="empty-state-title">Aucun stock enregistré</div>';
      html += '</div>';
    } else {
      html += '<div style="overflow-x:auto">';
      html += '<table style="width:100%;border-collapse:collapse;font-size:11px">';
      html += '<thead><tr style="border-bottom:2px solid var(--border)">';
      ['Secteur','Produit','Cat.','Lots','Qté','Min','Exp. proche'].forEach(function(h) {
        html += '<th style="text-align:left;padding:4px 6px;font-size:10px;color:var(--text2)">' + h + '</th>';
      });
      html += '</tr></thead><tbody>';

      rows.forEach(function(r) {
        var rowBg = r.worst === 'danger' ? 'background:var(--danger-bg,#fff0f0)'
                  : r.worst === 'warn'   ? 'background:var(--warn-bg,#fffbe6)'
                  : r.isLow             ? 'background:var(--low-bg,#f0f4ff)' : '';
        var expColor = r.worst === 'danger' ? 'color:var(--danger);font-weight:600'
                     : r.worst === 'warn'   ? 'color:var(--warn)' : 'color:var(--text2)';
        var catLabel = r.category === 'drug' ? 'Medic.' : r.category === 'device' ? 'DM' : r.category;
        html += '<tr style="border-bottom:1px solid var(--border);' + rowBg + '">';
        html += '<td style="padding:4px 6px">' + escH(r.sectorName) + '</td>';
        html += '<td style="padding:4px 6px;font-weight:500">' + escH(r.productName) + '</td>';
        html += '<td style="padding:4px 6px;font-size:10px;color:var(--text2)">' + catLabel + '</td>';
        html += '<td style="padding:4px 6px;text-align:center">' + r.lots + '</td>';
        html += '<td style="padding:4px 6px;font-weight:600' + (r.isLow ? ';color:var(--danger)' : '') + '">' + r.qty + ' ' + escH(r.unit) + '</td>';
        html += '<td style="padding:4px 6px;font-size:10px;color:var(--text3)">' + (r.alertQtyMin || '-') + '</td>';
        html += '<td style="padding:4px 6px;' + expColor + '">' + (r.nearestExpiry ? displayDate(r.nearestExpiry) : '-') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += '<div style="font-size:10px;color:var(--text2);margin-top:8px">' + rows.length + ' référence' + (rows.length > 1 ? 's' : '') + ' dans ' + sectors.length + ' secteur' + (sectors.length > 1 ? 's' : '') + '</div>';
    }

    window._reportStockRows = rows;
    html += '</div>';
    return html;
  }

  /* ── Export CSV ── */
  function _exportCSV(type) {
    var lines = [];
    var filename = 'stock-export-' + type + '-' + new Date().toISOString().slice(0, 10) + '.csv';

    if (type === 'expiry') {
      lines.push(['Secteur','Produit','Lot','Expiration','Quantite','Unite'].join(';'));
      (window._reportExpiryRows || []).forEach(function(r) {
        lines.push([r.sectorName, r.productName, r.lot, r.expiry, r.qty, r.unit].join(';'));
      });
    } else if (type === 'movements') {
      lines.push(['Date','Type','Produit','Lot','Quantite','Unite','Secteur','Cible'].join(';'));
      (window._reportMovementRows || []).forEach(function(m) {
        var product = storeGetProductById(m.productId);
        var sector  = storeGetSectorById(m.sectorId);
        var tgt     = m.targetSectorId ? storeGetSectorById(m.targetSectorId) : null;
        lines.push([
          m.date ? new Date(m.date).toISOString().slice(0,10) : '',
          m.type,
          product ? product.name : m.productId,
          m.lot || '',
          m.qty,
          product ? (product.unit || '') : '',
          sector ? sector.name : m.sectorId,
          tgt ? tgt.name : ''
        ].join(';'));
      });
    } else if (type === 'stock') {
      lines.push(['Secteur','Produit','Categorie','Lots','Quantite','Unite','Alerte min','Expiration proche'].join(';'));
      (window._reportStockRows || []).forEach(function(r) {
        lines.push([r.sectorName, r.productName, r.category, r.lots, r.qty, r.unit, r.alertQtyMin, r.nearestExpiry || ''].join(';'));
      });
    }

    if (lines.length <= 1) { showToast('Aucune donnée à exporter', 'warn'); return; }

    /* BOM UTF-8 pour Excel */
    var bom  = '\uFEFF';
    var blob = new Blob([bom + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Export CSV : ' + filename, 'success');
  }

  /* ── Expose ── */
  window.renderReport = renderReport;

}());

  function _downloadCSV(filename, rows) {

    var lines = rows.map(function(row) {

        /* Echapper les guillemets, encadrer si virgule/retour/guillemet */
        s = s.replace(/"/g, '""');
